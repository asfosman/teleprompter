<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI প্রো টেলিপম্পটার V20 - ডুয়াল রেকর্ড</title>
    <style>
        body {
            margin: 0; background-color: #000; color: #fff;
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
            display: flex; flex-direction: column; height: 100vh;
        }

        /* কন্ট্রোল প্যানেল */
        #controls {
            padding: 12px; background: #1a1a1a; display: flex;
            flex-direction: column; align-items: center; gap: 12px;
            z-index: 2000; border-bottom: 2px solid #333;
        }

        textarea {
            width: 90%; max-width: 550px; height: 50px; background: #222;
            color: #0f0; border: 1px solid #444; padding: 10px; border-radius: 10px; text-align: center;
            font-size: 14px; outline: none;
        }

        .main-buttons { display: flex; gap: 10px; justify-content: center; position: relative; }

        /* সেটিংস মেনু */
        #dropdown-menu {
            display: none; position: absolute; background-color: #222;
            width: 280px; box-shadow: 0px 10px 30px rgba(0,0,0,0.9);
            padding: 20px; z-index: 3000; border-radius: 15px;
            top: 55px; left: 50%; transform: translateX(-50%); border: 1px solid #444;
        }

        .setting-item { margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .setting-label { display: block; margin-bottom: 8px; font-size: 13px; color: #bbb; }
        .btn-group { display: flex; gap: 8px; }

        /* ক্যামেরা ড্র্যাগেবল */
        #video-container {
            position: absolute; top: 180px; right: 20px; 
            width: 150px; height: 150px; border: 3px solid #007bff;
            border-radius: 50%; overflow: hidden; background: #222; z-index: 999;
            cursor: move; touch-action: none; display: none;
        }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); pointer-events: none; }

        /* ডিসপ্লে এরিয়া ও টেক্সট */
        #display-area { flex-grow: 1; position: relative; overflow: hidden; background: #000; cursor: grab; }
        #scrolling-text {
            position: absolute; left: 50%; transform: translateX(-50%);
            width: 92%; text-align: center; font-size: 30px; font-weight: bold;
            line-height: 1.6; pointer-events: none; user-select: none; white-space: pre-wrap;
            top: 100px;
        }

        /* রেকর্ড মেনু */
        .rec-container {
            position: fixed; bottom: 30px; right: 30px;
            display: flex; flex-direction: row-reverse; align-items: center; gap: 12px; z-index: 5000;
        }
        #timer {
            position: absolute; bottom: 70px; right: 5px; color: #ff3333;
            font-family: monospace; font-size: 16px; font-weight: bold; display: none;
            background: rgba(0,0,0,0.8); padding: 2px 10px; border-radius: 5px;
        }
        .sub-rec-btn {
            width: 48px; height: 48px; border-radius: 50%; border: 2px solid white;
            display: none; align-items: center; justify-content: center; cursor: pointer;
        }
        #main-rec-btn {
            width: 60px; height: 60px; background: red; border-radius: 50%;
            border: 3px solid white; display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 0 15px rgba(255,0,0,0.4);
        }
        .recording-animation {
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* বাটন স্টাইল */
        button { padding: 10px 15px; cursor: pointer; border-radius: 20px; border: none; font-weight: bold; font-size: 13px; color: white; }
        .btn-blue { background: #007bff; }
        .btn-green { background: #28a745; }
        .btn-gray { background: #555; width: 100%; }
        .btn-inner { background: #444; flex: 1; }
        .active-btn { background: #f39c12 !important; }
        input[type="range"] { width: 100%; accent-color: #007bff; }
    </style>
</head>
<body onclick="closeAllMenus()">

<div id="controls">
    <textarea id="inputText" oninput="updateLiveText()" placeholder="আপনার স্ক্রিপ্ট এখানে পেস্ট করুন..."></textarea>
    <div class="main-buttons">
        <button class="btn-blue" onclick="refreshAndStartScroll()">শুরু</button>
        <button class="btn-green" onclick="toggleCamera()">ক্যামেরা</button>
        <div style="position: relative;" onclick="event.stopPropagation()">
            <button class="btn-gray" onclick="toggleSettings()">সেটিংস ⚙️</button>
            <div id="dropdown-menu">
                <div class="setting-item">
                    <span class="setting-label">বিউটি মোড</span>
                    <div class="btn-group">
                        <button id="bOff" class="btn-inner active-btn" onclick="setBeauty('off')">Off</button>
                        <button id="bOn" class="btn-inner" onclick="setBeauty('on')">স্মুথ ✨</button>
                    </div>
                </div>
                <div class="setting-item">
                    <span class="setting-label">ক্যামেরা শেপ</span>
                    <div class="btn-group">
                        <button class="btn-inner" onclick="changeShape('50%')">গোল</button>
                        <button class="btn-inner" onclick="changeShape('12px')">চৌকো</button>
                    </div>
                </div>
                <div class="setting-item">
                    <span class="setting-label">টেক্সট সাইজ</span>
                    <input type="range" id="textSizeRange" min="15" max="100" value="30" oninput="resizeText(this.value)">
                </div>
                <div class="setting-item">
                    <span class="setting-label">ক্যামেরা সাইজ</span>
                    <input type="range" id="camSizeRange" min="80" max="600" value="150" oninput="resizeCam(this.value)">
                </div>
                <div class="setting-item">
                    <span class="setting-label">স্ক্রলিং গতি</span>
                    <input type="range" id="speedRange" min="0.5" max="15" step="0.5" value="2">
                </div>
            </div>
        </div>
    </div>
</div>

<div id="video-container" onmousedown="dragCamStart(event)" ontouchstart="dragCamStart(event)">
    <video id="webcam" autoplay playsinline muted></video>
</div>

<div class="rec-container" onclick="event.stopPropagation()">
    <div id="timer">00:00:00</div>
    <div id="main-rec-btn" onclick="toggleRecMenu()">
        <div style="width:15px; height:15px; background:white; border-radius:50%;"></div>
    </div>
    <div id="start-btn" class="sub-rec-btn" style="background:#007bff;" onclick="startRecording()">⏺️</div>
    <div id="pause-btn" class="sub-rec-btn" style="background:#e67e22;" onclick="pauseRecording()">⏸️</div>
    <div id="save-btn" class="sub-rec-btn" style="background:#28a745;" onclick="stopRecording()">💾</div>
</div>

<div id="display-area" onmousedown="dragTextStart(event)" ontouchstart="dragTextStart(event)">
    <div id="scrolling-text">এখানে আপনার স্ক্রিপ্ট লিখুন...</div>
</div>

<script>
    let scrollInterval, isAutoScrolling = false, currentY = 100;
    let isMenuOpen = false, startTime, timerInterval;
    let mediaRecorder = null;
    let recordedChunks = [];
    let isRecording = false;
    let canvasElement = null;
    let canvasStream = null;
    let canvasAnimationId = null;
    let mediaStream = null;

    const scrollText = document.getElementById('scrolling-text');
    const videoElem = document.getElementById('webcam');
    const videoCont = document.getElementById('video-container');
    const displayArea = document.getElementById('display-area');
    const menu = document.getElementById('dropdown-menu');
    const timerDisplay = document.getElementById('timer');
    const mainRecBtn = document.getElementById('main-rec-btn');

    // ১. টেক্সট আপডেট ও স্ক্রলিং
    function updateLiveText() {
        let text = document.getElementById('inputText').value;
        scrollText.innerText = text ? text : "এখানে আপনার স্ক্রিপ্ট লিখুন...";
        if(!isAutoScrolling) { 
            currentY = 100; 
            scrollText.style.top = currentY + "px"; 
        }
    }

    function refreshAndStartScroll() {
        if(!document.getElementById('inputText').value) return alert("আগে স্ক্রিপ্ট লিখুন!");
        
        currentY = displayArea.offsetHeight; 
        scrollText.style.top = currentY + "px";
        
        isAutoScrolling = true;
        if(scrollInterval) clearInterval(scrollInterval);
        
        scrollInterval = setInterval(() => {
            if(isAutoScrolling) {
                currentY -= parseFloat(document.getElementById('speedRange').value);
                scrollText.style.top = currentY + "px";
                if(currentY < -scrollText.offsetHeight) {
                    currentY = displayArea.offsetHeight;
                }
            }
        }, 25);
    }

    // ২. ড্র্যাগিং লজিক
    function dragCamStart(e) {
        let ev = e.touches ? e.touches[0] : e;
        let startX = ev.clientX - videoCont.offsetLeft;
        let startY = ev.clientY - videoCont.offsetTop;
        function move(e) {
            let ev2 = e.touches ? e.touches[0] : e;
            videoCont.style.left = (ev2.clientX - startX) + "px";
            videoCont.style.top = (ev2.clientY - startY) + "px";
            videoCont.style.right = "auto";
        }
        function stop() { document.removeEventListener('mousemove', move); document.removeEventListener('touchmove', move); }
        document.addEventListener('mousemove', move); document.addEventListener('touchmove', move, {passive: false});
        document.addEventListener('mouseup', stop); document.addEventListener('touchend', stop);
    }

    function dragTextStart(e) {
        isAutoScrolling = false;
        let ev = e.touches ? e.touches[0] : e;
        let sY = ev.clientY - currentY;
        function move(e) {
            let ev2 = e.touches ? e.touches[0] : e;
            currentY = ev2.clientY - sY;
            scrollText.style.top = currentY + "px";
        }
        function stop() { document.removeEventListener('mousemove', move); document.removeEventListener('touchmove', move); }
        document.addEventListener('mousemove', move); document.addEventListener('touchmove', move, {passive: false});
        document.addEventListener('mouseup', stop); document.addEventListener('touchend', stop);
    }

    // ৩. সেটিংস ফাংশন
    function toggleSettings() { menu.style.display = (menu.style.display === "block") ? "none" : "block"; }
    function closeAllMenus() { 
        menu.style.display = "none"; 
        if(!isMenuOpen) document.querySelectorAll('.sub-rec-btn').forEach(b => b.style.display = 'none');
    }
    function resizeText(v) { scrollText.style.fontSize = v + "px"; }
    function changeShape(s) { videoCont.style.borderRadius = s; }
    function resizeCam(v) { videoCont.style.width = v+"px"; videoCont.style.height = v+"px"; }
    function setBeauty(m) {
        videoElem.style.filter = (m==='on') ? "brightness(1.2) contrast(1.1) blur(0.4px)" : "none";
        document.getElementById('bOn').classList.toggle('active-btn', m==='on');
        document.getElementById('bOff').classList.toggle('active-btn', m==='off');
    }

    function toggleRecMenu() {
        isMenuOpen = !isMenuOpen;
        document.querySelectorAll('.sub-rec-btn').forEach(b => b.style.display = isMenuOpen ? 'flex' : 'none');
    }

    // ৪. ক্যামেরা টগল
    async function toggleCamera() {
        if(videoCont.style.display === "block") {
            videoCont.style.display = "none";
            if(mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }
        } else {
            videoCont.style.display = "block";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({video: {facingMode: "user", width: 1280}, audio: true});
                mediaStream = stream;
                videoElem.srcObject = stream;
            } catch(err) {
                console.error("Camera error:", err);
                alert("ক্যামেরা অ্যাক্সেস প্রয়োজন!");
            }
        }
    }

    // ৫. রেকর্ডিং ফাংশন (ক্যামেরা + স্ক্রল টেক্সট একসাথে)
    async function startRecording() {
        if(isRecording) return;
        if(!mediaStream) {
            alert("দয়া করে ক্যামেরা অন করুন!");
            return;
        }
        
        recordedChunks = [];
        
        // ক্যানভাস তৈরি
        if(!canvasElement) {
            canvasElement = document.createElement('canvas');
            canvasElement.style.position = 'fixed';
            canvasElement.style.top = '-1000px';
            canvasElement.style.left = '-1000px';
            document.body.appendChild(canvasElement);
        }
        
        const cameraArea = document.getElementById('display-area');
        const rect = cameraArea.getBoundingClientRect();
        canvasElement.width = rect.width;
        canvasElement.height = rect.height;
        const ctx = canvasElement.getContext('2d');
        
        function drawFrame() {
            if(!canvasElement) return;
            const newRect = cameraArea.getBoundingClientRect();
            if(canvasElement.width !== newRect.width || canvasElement.height !== newRect.height) {
                canvasElement.width = newRect.width;
                canvasElement.height = newRect.height;
            }
            ctx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // ক্যামেরা ড্র
            if(videoElem.videoWidth && videoElem.videoHeight && videoCont.style.display === "block") {
                const camRect = videoCont.getBoundingClientRect();
                const relX = camRect.left - newRect.left;
                const relY = camRect.top - newRect.top;
                ctx.drawImage(videoElem, relX, relY, camRect.width, camRect.height);
            }
            
            // টেক্সট ড্র
            const textDiv = scrollText;
            const textRect = textDiv.getBoundingClientRect();
            const textX = textRect.left - newRect.left;
            const textY = textRect.top - newRect.top;
            ctx.font = window.getComputedStyle(textDiv).fontSize + " " + window.getComputedStyle(textDiv).fontFamily;
            ctx.fillStyle = window.getComputedStyle(textDiv).color;
            ctx.shadowBlur = 2;
            ctx.shadowColor = "black";
            
            const lines = textDiv.innerText.split('\n');
            let lineHeight = parseInt(window.getComputedStyle(textDiv).fontSize) * 1.3;
            for(let i = 0; i < lines.length; i++) {
                ctx.fillText(lines[i], textX + 20, textY + (i * lineHeight) + 25);
            }
            
            // টাইমার ড্র
            ctx.font = "bold 24px monospace";
            ctx.fillStyle = "#ff3333";
            ctx.fillText(timerDisplay.innerText, newRect.width - 100, 40);
            
            canvasAnimationId = requestAnimationFrame(drawFrame);
        }
        
        if(canvasAnimationId) cancelAnimationFrame(canvasAnimationId);
        drawFrame();
        
        canvasStream = canvasElement.captureStream(30);
        
        // অডিও যোগ
        const audioTracks = mediaStream.getAudioTracks();
        let finalStream = canvasStream;
        if(audioTracks.length > 0) {
            const audioStream = new MediaStream(audioTracks);
            finalStream = new MediaStream([...canvasStream.getVideoTracks(), ...audioStream.getAudioTracks()]);
        }
        
        mediaRecorder = new MediaRecorder(finalStream, { mimeType: 'video/webm' });
        mediaRecorder.ondataavailable = (event) => {
            if(event.data.size > 0) recordedChunks.push(event.data);
        };
        mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `teleprompter_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.webm`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            alert("✅ ভিডিও সেভ হয়েছে!");
            recordedChunks = [];
        };
        
        mediaRecorder.start();
        isRecording = true;
        startTime = Date.now();
        timerDisplay.style.display = 'block';
        timerInterval = setInterval(() => {
            let elapsed = Date.now() - startTime;
            let hours = Math.floor(elapsed / 3600000);
            let minutes = Math.floor((elapsed % 3600000) / 60000);
            let seconds = Math.floor((elapsed % 60000) / 1000);
            timerDisplay.innerText = `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
        }, 1000);
        
        mainRecBtn.classList.add('recording-animation');
        alert("🔴 রেকর্ডিং শুরু হয়েছে!");
    }
    
    function pauseRecording() {
        if(!isRecording || !mediaRecorder) return;
        if(mediaRecorder.state === "recording") {
            mediaRecorder.pause();
            clearInterval(timerInterval);
            isRecording = false;
            mainRecBtn.classList.remove('recording-animation');
            alert("⏸️ রেকর্ডিং পaused");
        } else if(mediaRecorder.state === "paused") {
            mediaRecorder.resume();
            startTime = Date.now() - (Date.now() - startTime);
            timerInterval = setInterval(() => {
                let elapsed = Date.now() - startTime;
                let hours = Math.floor(elapsed / 3600000);
                let minutes = Math.floor((elapsed % 3600000) / 60000);
                let seconds = Math.floor((elapsed % 60000) / 1000);
                timerDisplay.innerText = `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
            }, 1000);
            isRecording = true;
            mainRecBtn.classList.add('recording-animation');
            alert("▶️ রেকর্ডিং resumed");
        }
    }
    
    function stopRecording() {
        if(!mediaRecorder) return;
        if(mediaRecorder.state === "recording" || mediaRecorder.state === "paused") {
            mediaRecorder.stop();
        }
        if(canvasAnimationId) {
            cancelAnimationFrame(canvasAnimationId);
            canvasAnimationId = null;
        }
        if(canvasStream) {
            canvasStream.getTracks().forEach(track => track.stop());
        }
        clearInterval(timerInterval);
        timerDisplay.style.display = 'none';
        isRecording = false;
        mainRecBtn.classList.remove('recording-animation');
        alert("💾 ভিডিও সংরক্ষণ করা হচ্ছে...");
    }
</script>

</body>
    </html>
