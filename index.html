<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI প্রো টেলিপম্পটার V13</title>
    <style>
        body {
            margin: 0; background-color: #000; color: #fff;
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
            display: flex; flex-direction: column; height: 100vh;
        }

        /* কন্ট্রোল প্যানেল */
        #controls {
            padding: 10px; background: #1a1a1a; display: flex;
            flex-direction: column; align-items: center; gap: 10px;
            z-index: 2000; border-bottom: 2px solid #333;
        }

        textarea {
            width: 90%; max-width: 500px; height: 45px; background: #222;
            color: #0f0; border: 1px solid #444; padding: 8px; border-radius: 8px; text-align: center;
        }

        .main-buttons { display: flex; gap: 8px; justify-content: center; position: relative; }

        /* সেটিংস মেনু */
        #dropdown-menu {
            display: none; position: absolute; background-color: #222;
            min-width: 260px; box-shadow: 0px 8px 20px rgba(0,0,0,0.8);
            padding: 15px; z-index: 3000; border-radius: 12px;
            top: 45px; left: 50%; transform: translateX(-50%); border: 1px solid #444;
        }

        .setting-item { margin-bottom: 12px; display: flex; flex-direction: column; gap: 8px; border-bottom: 1px solid #333; padding-bottom: 10px; }

        /* ক্যামেরা */
        #video-container {
            position: absolute; top: 180px; right: 20px; 
            width: 150px; height: 150px; 
            border: 3px solid #007bff; border-radius: 50%; 
            overflow: hidden; background: #222; z-index: 999;
            cursor: move; touch-action: none; display: none;
        }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); transition: filter 0.3s ease; }

        /* স্ক্রলিং এরিয়া */
        #display-area { flex-grow: 1; position: relative; overflow: hidden; touch-action: none; cursor: grab; }
        #scrolling-text {
            position: absolute; left: 50%; transform: translateX(-50%);
            width: 90%; text-align: center; font-size: 30px; font-weight: bold;
            line-height: 1.5; pointer-events: none; user-select: none; white-space: pre-wrap;
        }

        /* রেকর্ডিং মেনু - বাম দিকে পাখা মেলবে */
        .rec-container {
            position: fixed; bottom: 25px; right: 25px; /* মেইন বাটন ডানেই থাকল */
            display: flex; flex-direction: row-reverse; /* উল্টা দিকে অর্থাৎ বামে সাজাবে */
            align-items: center; gap: 12px;
            z-index: 5000;
        }
        .sub-rec-btn {
            width: 45px; height: 45px; border-radius: 50%; border: 2px solid white;
            display: none; align-items: center; justify-content: center;
            color: white; font-weight: bold; cursor: pointer; font-size: 18px;
            transition: all 0.3s ease;
        }
        #main-rec-btn {
            width: 55px; height: 55px; background: red; border-radius: 50%;
            border: 3px solid white; display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 0 10px rgba(255,0,0,0.4);
        }
        .recording-blink { animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        button { padding: 8px 12px; cursor: pointer; border-radius: 15px; border: none; background: #007bff; color: white; font-weight: bold; font-size: 12px; }
        .btn-settings { background: #6c757d; }
        .btn-inner { background: #444; }
        .active-filter { background: #f39c12 !important; }
    </style>
</head>
<body onclick="closeAllMenus(event)">

<div id="controls">
    <textarea id="inputText" oninput="updateLiveText()" placeholder="আপনার স্ক্রিপ্ট এখানে পেস্ট করুন..."></textarea>
    
    <div class="main-buttons">
        <button onclick="startScroll()">শুরু</button>
        <button style="background: #28a745;" onclick="toggleCamera()">ক্যামেরা</button>
        
        <div style="position: relative;">
            <button class="btn-settings" onclick="toggleSettings(event)">সেটিংস ⚙️</button>
            <div id="dropdown-menu" onclick="event.stopPropagation()">
                <div class="setting-item">
                    <span>বিউটি মোড:</span>
                    <div style="display:flex; gap:10px;">
                        <button id="beautyOff" class="btn-inner active-filter" onclick="setBeauty('off')">Off</button>
                        <button id="beautyOn" class="btn-inner" onclick="setBeauty('on')">স্মুথ ও ব্রাইট ✨</button>
                    </div>
                </div>
                <div class="setting-item">
                    <span>ক্যামেরা শেপ:</span>
                    <div style="display:flex; gap:10px;">
                        <button class="btn-inner" onclick="changeShape('50%')">Round</button>
                        <button class="btn-inner" onclick="changeShape('10px')">Square</button>
                    </div>
                </div>
                <div class="setting-item">
                    <span>ক্যামেরা সাইজ:</span>
                    <input type="range" min="50" max="600" value="150" oninput="liveCamResize(this.value)">
                </div>
                <div class="setting-item">
                    <span>টেক্সট সাইজ:</span>
                    <div style="display:flex; gap:10px;">
                        <button class="btn-inner" onclick="changeFontSize(4)">A +</button>
                        <button class="btn-inner" onclick="changeFontSize(-4)">A -</button>
                    </div>
                </div>
                <div class="setting-item">
                    <span>গতি:</span>
                    <input type="range" id="speedRange" min="0.5" max="10" step="0.5" value="2">
                </div>
            </div>
        </div>
    </div>
</div>

<div id="video-container" onmousedown="dragStartCam(event)" ontouchstart="dragStartCam(event)">
    <video id="webcam" autoplay playsinline muted></video>
</div>

<div class="rec-container" onclick="event.stopPropagation()">
    <div id="main-rec-btn" onclick="toggleRecMenu()">
        <span id="rec-status-icon" style="width: 12px; height: 12px; background: white; border-radius: 50%;"></span>
    </div>
    <div id="start-btn" class="sub-rec-btn" style="background: #007bff;" onclick="startRecording()" title="Record">⏺️</div>
    <div id="pause-btn" class="sub-rec-btn" style="background: #e67e22;" onclick="pauseRecording()" title="Pause">⏸️</div>
    <div id="save-btn" class="sub-rec-btn" style="background: #28a745;" onclick="stopAndSave()" title="Save">💾</div>
</div>

<div id="display-area" onmousedown="dragStartText(event)" ontouchstart="dragStartText(event)">
    <div id="scrolling-text"></div>
</div>

<script>
    let scrollInterval, isPaused = true, currentY = 0;
    let currentFontSize = 30, isDraggingText = false, startY;
    let mediaRecorder, recordedChunks = [];
    let isRecordingMenuOpen = false;

    const scrollText = document.getElementById('scrolling-text');
    const speedInput = document.getElementById('speedRange');
    const displayArea = document.getElementById('display-area');
    const videoCont = document.getElementById('video-container');
    const videoElem = document.getElementById('webcam');
    const menu = document.getElementById('dropdown-menu');
    const inputTextArea = document.getElementById('inputText');

    function toggleRecMenu() {
        isRecordingMenuOpen = !isRecordingMenuOpen;
        const btns = document.querySelectorAll('.sub-rec-btn');
        btns.forEach(btn => btn.style.display = isRecordingMenuOpen ? 'flex' : 'none');
    }

    async function startRecording() {
        if (!videoElem.srcObject) return alert("আগে ক্যামেরা অন করুন!");
        recordedChunks = [];
        mediaRecorder = new MediaRecorder(videoElem.srcObject, { mimeType: 'video/webm' });
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
        mediaRecorder.start();
        document.getElementById('main-rec-btn').classList.add('recording-blink');
        alert("রেকর্ডিং শুরু হয়েছে!");
    }

    function pauseRecording() {
        if (mediaRecorder && mediaRecorder.state === "recording") { mediaRecorder.pause(); alert("পজ করা হয়েছে।"); }
        else if (mediaRecorder && mediaRecorder.state === "paused") { mediaRecorder.resume(); alert("আবার শুরু হয়েছে।"); }
    }

    function stopAndSave() {
        if (mediaRecorder) {
            mediaRecorder.stop();
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'teleprompter_video.webm';
                a.click();
                document.getElementById('main-rec-btn').classList.remove('recording-blink');
                toggleRecMenu();
            };
        }
    }

    function setBeauty(mode) {
        videoElem.style.filter = (mode === 'on') ? "brightness(1.2) contrast(1.1) saturate(1.1) blur(0.4px)" : "none";
        document.getElementById('beautyOn').classList.toggle('active-filter', mode === 'on');
        document.getElementById('beautyOff').classList.toggle('active-filter', mode === 'off');
    }

    function updateLiveText() {
        scrollText.innerText = inputTextArea.value;
        if(isPaused) { currentY = 100; scrollText.style.top = currentY + "px"; }
    }

    function liveCamResize(val) { videoCont.style.width = val + "px"; videoCont.style.height = val + "px"; }
    function changeShape(type) { videoCont.style.borderRadius = type; }

    function dragStartText(e) {
        if (menu.style.display === "block") { menu.style.display = "none"; return; }
        isPaused = true; isDraggingText = true;
        let ev = e.type === 'touchstart' ? e.touches[0] : e;
        startY = ev.clientY - currentY;
        document.onmousemove = dragText; document.ontouchmove = dragText;
        document.onmouseup = dragEndText; document.ontouchend = dragEndText;
    }
    function dragText(e) {
        if (!isDraggingText) return;
        let ev = e.type === 'touchmove' ? e.touches[0] : e;
        currentY = ev.clientY - startY;
        scrollText.style.top = currentY + "px";
    }
    function dragEndText() { isDraggingText = false; isPaused = false; document.onmousemove = null; document.ontouchmove = null; }

    function startScroll() {
        if(!inputTextArea.value) return alert("স্ক্রিপ্ট দিন!");
        currentY = displayArea.offsetHeight; isPaused = false;
        if(scrollInterval) clearInterval(scrollInterval);
        scrollInterval = setInterval(() => {
            if (!isPaused && !isDraggingText) {
                currentY -= parseFloat(speedInput.value);
                scrollText.style.top = currentY + "px";
                if (currentY < -scrollText.offsetHeight) currentY = displayArea.offsetHeight;
            }
        }, 25);
    }

    function toggleSettings(e) { e.stopPropagation(); menu.style.display = (menu.style.display === "block") ? "none" : "block"; }
    function closeAllMenus(e) { 
        menu.style.display = "none"; 
        isRecordingMenuOpen = false;
        document.querySelectorAll('.sub-rec-btn').forEach(btn => btn.style.display = 'none');
    }
    function changeFontSize(amount) { currentFontSize += amount; scrollText.style.fontSize = currentFontSize + "px"; }

    async function toggleCamera() {
        if (videoCont.style.display === "block") {
            videoCont.style.display = "none";
            if(videoElem.srcObject) { videoElem.srcObject.getTracks().forEach(t => t.stop()); videoElem.srcObject = null; }
        } else {
            videoCont.style.display = "block";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: 1280 } });
                videoElem.srcObject = stream;
            } catch (err) { alert("ক্যামেরা অন করুন!"); }
        }
    }

    let camActive = false, camInitX, camInitY;
    function dragStartCam(e) {
        let ev = e.type === 'touchstart' ? e.touches[0] : e;
        camInitX = ev.clientX - videoCont.offsetLeft;
        camInitY = ev.clientY - videoCont.offsetTop;
        camActive = true;
        document.onmousemove = dragCam; document.ontouchmove = dragCam;
        document.onmouseup = dragEndCam; document.ontouchend = dragEndCam;
    }
    function dragCam(e) {
        if (camActive) {
            let ev = e.type === 'touchmove' ? e.touches[0] : e;
            videoCont.style.left = (ev.clientX - camInitX) + "px";
            videoCont.style.top = (ev.clientY - camInitY) + "px";
            videoCont.style.right = "auto";
        }
    }
    function dragEndCam() { camActive = false; }
</script>

</body>
    </html>
