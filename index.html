<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI প্রো টেলিপম্পটার V34 - শব্দ অক্ষত রাখে</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            margin: 0; background-color: #000; color: #fff;
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
            display: flex; flex-direction: column; height: 100vh;
        }

        #controls {
            padding: 8px; background: #1a1a1a; display: flex;
            flex-direction: column; align-items: center; gap: 6px;
            z-index: 2000; border-bottom: 2px solid #333;
        }

        textarea {
            width: 90%; max-width: 550px; height: 40px; background: #222;
            color: #0f0; border: 1px solid #444; padding: 6px; border-radius: 8px;
            font-size: 12px; outline: none;
            font-family: monospace;
        }

        .main-buttons { display: flex; gap: 6px; justify-content: center; position: relative; flex-wrap: wrap; }

        #dropdown-menu {
            display: none; position: absolute; background-color: #1e1e1e;
            width: 250px; box-shadow: 0px 10px 30px rgba(0,0,0,0.9);
            padding: 10px; z-index: 3000; border-radius: 12px;
            top: 45px; left: 50%; transform: translateX(-50%); border: 1px solid #444;
        }

        .setting-item { margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 6px; }
        .setting-label { display: block; margin-bottom: 4px; font-size: 11px; color: #bbb; }
        .btn-group { display: flex; gap: 5px; }

        #video-container {
            position: absolute; top: 180px; right: 20px; 
            width: 150px; height: 150px; border: 3px solid #007bff;
            border-radius: 50%; overflow: hidden; background: #222; z-index: 999;
            cursor: grab; touch-action: none; display: none;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        #video-container:active { cursor: grabbing; }
        video { 
            width: 100%; height: 100%; object-fit: cover; 
            pointer-events: none;
        }
        
        .drag-handle {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.05);
            cursor: grab;
            z-index: 10;
        }
        .drag-handle::after {
            content: "⋮⋮";
            position: absolute;
            top: 3px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            background: rgba(0,0,0,0.5);
            padding: 2px 5px;
            border-radius: 12px;
            pointer-events: none;
        }

        #display-area { 
            flex-grow: 1; position: relative; overflow: hidden; background: #000; 
            cursor: grab; 
        }
        #display-area:active { cursor: grabbing; }
        
        /* টেক্সট স্ক্রিন ফিট করার জন্য CSS */
        #scrolling-text {
            position: absolute;
            left: 5%;
            width: 90%;
            text-align: center;
            font-size: clamp(20px, 6vw, 45px);
            font-weight: bold;
            line-height: 1.4;
            pointer-events: none;
            user-select: none;
            white-space: pre-wrap;
            word-wrap: break-word;
            word-break: keep-all; /* শব্দ ভাঙা বন্ধ */
            overflow-wrap: break-word;
            top: 100px;
            font-family: 'Segoe UI', 'Bangla', monospace;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            color: white;
        }

        /* রেকর্ড বাটন */
        .rec-container {
            position: fixed; bottom: 15px; right: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 5000;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
        }
        #timer {
            color: #ff5555;
            font-family: monospace;
            font-size: 16px;
            font-weight: bold;
            background: rgba(0,0,0,0.7);
            padding: 4px 10px;
            border-radius: 20px;
            letter-spacing: 1px;
        }
        .rec-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 22px;
            transition: transform 0.1s;
            border: 2px solid white;
        }
        .rec-btn:active { transform: scale(0.94); }
        .recording-active { animation: blink 1s infinite; }
        @keyframes blink {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }
        .cam-record { background: #dc3545; }
        .text-record { background: #28a745; }
        .save-record { background: #007bff; }
        .paused-state { background: #f39c12 !important; animation: none !important; }

        button { padding: 6px 10px; cursor: pointer; border-radius: 18px; border: none; font-weight: bold; font-size: 11px; color: white; }
        .btn-blue { background: #007bff; }
        .btn-green { background: #28a745; }
        .btn-gray { background: #555; width: 100%; }
        .btn-inner { background: #444; flex: 1; padding: 4px 6px; font-size: 10px; }
        .active-btn { background: #f39c12 !important; }
        input[type="range"] { width: 100%; accent-color: #007bff; margin: 4px 0; }
        
        .status-msg {
            position: fixed;
            bottom: 80px;
            left: 12px;
            background: rgba(0,0,0,0.7);
            padding: 3px 8px;
            border-radius: 16px;
            font-size: 10px;
            color: #0f0;
            z-index: 5000;
        }
        
        .cam-switch-setting {
            background: #6c5ce7;
            color: white;
            width: 100%;
            padding: 5px;
            font-size: 11px;
            border-radius: 18px;
        }
        
        .text-size-info {
            font-size: 10px;
            color: #ffaa44;
            text-align: center;
            margin-top: 5px;
        }
    </style>
</head>
<body onclick="closeAllMenus()">

<div id="controls">
    <textarea id="inputText" oninput="updateLiveText()" placeholder="আপনার স্ক্রিপ্ট লিখুন (এন্টার দিয়ে নতুন লাইন)..."></textarea>
    <div class="main-buttons">
        <button class="btn-blue" onclick="refreshAndStartScroll()">শুরু</button>
        <button class="btn-green" onclick="toggleCamera()">ক্যামেরা</button>
        <div style="position: relative;" onclick="event.stopPropagation()">
            <button class="btn-gray" onclick="toggleSettings()">সেটিংস ⚙️</button>
            <div id="dropdown-menu">
                <div class="setting-item">
                    <span class="setting-label">📷 ক্যামেরা নির্বাচন</span>
                    <button class="cam-switch-setting" onclick="switchCamera()">🔄 ক্যামেরা পাল্টান</button>
                </div>
                <div class="setting-item">
                    <span class="setting-label">✨ বিউটি মোড</span>
                    <div class="btn-group">
                        <button id="bOff" class="btn-inner active-btn" onclick="setBeauty('off')">Off</button>
                        <button id="bOn" class="btn-inner" onclick="setBeauty('on')">স্মুথ</button>
                    </div>
                </div>
                <div class="setting-item">
                    <span class="setting-label">📐 ক্যামেরা শেপ</span>
                    <div class="btn-group">
                        <button class="btn-inner" onclick="changeShape('50%')">গোল</button>
                        <button class="btn-inner" onclick="changeShape('12px')">চৌকো</button>
                    </div>
                </div>
                <div class="setting-item">
                    <span class="setting-label">📝 টেক্সট সাইজ</span>
                    <input type="range" id="textSizeRange" min="18" max="60" value="32" oninput="resizeText(this.value)">
                    <div class="text-size-info">শব্দ অক্ষত রাখে | স্ক্রিন ফিট</div>
                </div>
                <div class="setting-item">
                    <span class="setting-label">📷 ক্যামেরা সাইজ</span>
                    <input type="range" id="camSizeRange" min="80" max="500" value="150" oninput="resizeCam(this.value)">
                </div>
                <div class="setting-item">
                    <span class="setting-label">⚡ স্ক্রলিং গতি</span>
                    <input type="range" id="speedRange" min="0.5" max="15" step="0.5" value="2">
                </div>
                <div class="setting-item">
                    <span class="setting-label">🎬 রেজুলেশন</span>
                    <div class="btn-group">
                        <button class="btn-inner" onclick="setResolution('hd')">HD (720p)</button>
                        <button class="btn-inner active-btn" onclick="setResolution('fullhd')">Full HD</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="video-container">
    <div class="drag-handle"></div>
    <video id="webcam" autoplay playsinline muted></video>
</div>

<div class="rec-container" onclick="event.stopPropagation()">
    <div id="timer">00:00:00</div>
    <div id="camRecBtn" class="rec-btn cam-record" onclick="toggleCameraRecording()">📹</div>
    <div id="textRecBtn" class="rec-btn text-record" onclick="toggleTextRecording()">📝</div>
    <div id="saveBtn" class="rec-btn save-record" onclick="stopRecording()">💾</div>
</div>

<div id="display-area" onmousedown="dragTextStart(event)" ontouchstart="dragTextStart(event)">
    <div id="scrolling-text">এখানে আপনার স্ক্রিপ্ট লিখুন...</div>
</div>

<div class="status-msg" id="statusMsg">✅ প্রস্তুত | শব্দ অক্ষত রাখে</div>

<script>
    const scrollText = document.getElementById('scrolling-text');
    const videoElem = document.getElementById('webcam');
    const videoCont = document.getElementById('video-container');
    const displayArea = document.getElementById('display-area');
    const menu = document.getElementById('dropdown-menu');
    const timerDisplay = document.getElementById('timer');
    const camRecBtn = document.getElementById('camRecBtn');
    const textRecBtn = document.getElementById('textRecBtn');
    const speedRange = document.getElementById('speedRange');
    const textSizeRange = document.getElementById('textSizeRange');
    const statusMsg = document.getElementById('statusMsg');

    let scrollInterval, isAutoScrolling = false, currentY = 100;
    let isMenuOpen = false;
    let mediaStream = null;
    let currentFacingMode = 'user';
    let currentResolution = 'fullhd';
    let currentTextSize = 32;
    
    // রেকর্ডিং স্টেট
    let cameraRecorder = null;
    let cameraChunks = [];
    let isCameraRecording = false;
    let isCameraPaused = false;
    
    let textRecorder = null;
    let textChunks = [];
    let isTextRecording = false;
    let isTextPaused = false;
    let textStream = null;
    let textCanvas = null;
    let textAnimationId = null;
    
    // টাইমার ভেরিয়েবল
    let cameraStartTime = 0;
    let textStartTime = 0;
    let cameraPausedDuration = 0;
    let textPausedDuration = 0;
    let cameraCurrentPauseStart = 0;
    let textCurrentPauseStart = 0;
    let timerInterval = null;
    let activeRecordings = 0;

    // শব্দ ভাঙা রোধ করে টেক্সট র‍্যাপ করার ফাংশন
    function wrapText(ctx, text, maxWidth) {
        const words = text.split(' ');
        const lines = [];
        let currentLine = '';
        
        for(let i = 0; i < words.length; i++) {
            const word = words[i];
            const testLine = currentLine ? currentLine + ' ' + word : word;
            const metrics = ctx.measureText(testLine);
            
            if(metrics.width > maxWidth && currentLine !== '') {
                lines.push(currentLine);
                currentLine = word;
            } else {
                currentLine = testLine;
            }
        }
        if(currentLine) {
            lines.push(currentLine);
        }
        return lines;
    }

    function resizeText(value) {
        currentTextSize = parseInt(value);
        const finalSize = Math.max(18, Math.min(60, currentTextSize));
        scrollText.style.fontSize = finalSize + "px";
        scrollText.style.lineHeight = (finalSize * 1.4) + "px";
    }

    function getAudioConstraints() {
        return {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true,
            sampleRate: 48000,
            sampleSize: 16,
            channelCount: 2
        };
    }

    function getMimeType() {
        const mimeTypes = [
            'video/mp4;codecs=avc1.42E01E,mp4a.40.2',
            'video/mp4',
            'video/webm;codecs=vp9,opus',
            'video/webm'
        ];
        for (let mime of mimeTypes) {
            if (MediaRecorder.isTypeSupported(mime)) {
                return mime;
            }
        }
        return 'video/webm';
    }

    function getVideoConstraints() {
        const constraints = { 
            video: { facingMode: { exact: currentFacingMode } }, 
            audio: getAudioConstraints()
        };
        if(currentResolution === 'fullhd') {
            constraints.video.width = { ideal: 1920 };
            constraints.video.height = { ideal: 1080 };
            constraints.video.frameRate = { ideal: 30 };
        } else {
            constraints.video.width = { ideal: 1280 };
            constraints.video.height = { ideal: 720 };
            constraints.video.frameRate = { ideal: 30 };
        }
        return constraints;
    }

    function setResolution(type) {
        currentResolution = type;
        const btns = document.querySelectorAll('#dropdown-menu .setting-item:last-child .btn-inner');
        btns.forEach(btn => btn.classList.remove('active-btn'));
        if(type === 'hd') {
            btns[0].classList.add('active-btn');
            statusMsg.innerText = "HD (720p)";
        } else {
            btns[1].classList.add('active-btn');
            statusMsg.innerText = "Full HD (1080p)";
        }
        setTimeout(() => statusMsg.innerText = "✅ প্রস্তুত | শব্দ অক্ষত রাখে", 1500);
        if(mediaStream) {
            const wasOn = videoCont.style.display === "block";
            if(wasOn) { toggleCamera(); setTimeout(() => toggleCamera(), 500); }
        }
    }

    function makeDraggable(element) {
        let isDragging = false, startX, startY;
        const onMouseDown = (e) => {
            e.preventDefault(); e.stopPropagation();
            isDragging = true;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const rect = element.getBoundingClientRect();
            startX = clientX - rect.left;
            startY = clientY - rect.top;
            element.style.right = 'auto';
            element.style.bottom = 'auto';
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
            document.addEventListener('touchmove', onMouseMove, { passive: false });
            document.addEventListener('touchend', onMouseUp);
        };
        const onMouseMove = (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            let newLeft = clientX - startX;
            let newTop = clientY - startY;
            newLeft = Math.max(5, Math.min(window.innerWidth - element.offsetWidth - 5, newLeft));
            newTop = Math.max(5, Math.min(window.innerHeight - element.offsetHeight - 100, newTop));
            element.style.left = newLeft + 'px';
            element.style.top = newTop + 'px';
        };
        const onMouseUp = () => {
            isDragging = false;
            document.removeEventListener('mousemove', onMouseMove);
            document.removeEventListener('mouseup', onMouseUp);
            document.removeEventListener('touchmove', onMouseMove);
            document.removeEventListener('touchend', onMouseUp);
        };
        element.addEventListener('mousedown', onMouseDown);
        element.addEventListener('touchstart', onMouseDown, { passive: false });
    }

    async function switchCamera() {
        if(!mediaStream) { alert("প্রথমে ক্যামেরা চালু করুন!"); return; }
        currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
        if(mediaStream) mediaStream.getTracks().forEach(track => track.stop());
        try {
            const constraints = getVideoConstraints();
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            mediaStream = stream;
            videoElem.srcObject = stream;
            videoElem.style.transform = currentFacingMode === 'user' ? "scaleX(-1)" : "scaleX(1)";
            const camName = currentFacingMode === 'user' ? 'সামনের' : 'পিছনের';
            statusMsg.innerText = `✅ ${camName} ক্যামেরা`;
            setTimeout(() => statusMsg.innerText = "✅ প্রস্তুত | শব্দ অক্ষত রাখে", 1500);
        } catch(err) { alert("ক্যামেরা পরিবর্তন করা যায়নি!"); }
    }

    function updateLiveText() {
        let text = document.getElementById('inputText').value;
        scrollText.innerText = text || "এখানে আপনার স্ক্রিপ্ট লিখুন...";
        if(!isAutoScrolling) { 
            currentY = 100; 
            scrollText.style.top = currentY + "px"; 
        }
        scrollText.style.whiteSpace = "pre-wrap";
        scrollText.style.wordBreak = "keep-all";
    }

    function refreshAndStartScroll() {
        if(!document.getElementById('inputText').value) return alert("আগে স্ক্রিপ্ট লিখুন!");
        currentY = displayArea.offsetHeight; 
        scrollText.style.top = currentY + "px";
        isAutoScrolling = true;
        if(scrollInterval) clearInterval(scrollInterval);
        scrollInterval = setInterval(() => {
            if(isAutoScrolling) {
                currentY -= parseFloat(speedRange.value);
                scrollText.style.top = currentY + "px";
                if(currentY < -scrollText.offsetHeight) currentY = displayArea.offsetHeight;
            }
        }, 25);
    }

    function dragTextStart(e) {
        isAutoScrolling = false;
        let ev = e.touches ? e.touches[0] : e;
        let sY = ev.clientY - currentY;
        function move(e) {
            let ev2 = e.touches ? e.touches[0] : e;
            currentY = ev2.clientY - sY;
            scrollText.style.top = currentY + "px";
        }
        function stop() { 
            document.removeEventListener('mousemove', move); 
            document.removeEventListener('touchmove', move); 
        }
        document.addEventListener('mousemove', move); 
        document.addEventListener('touchmove', move, {passive: false});
        document.addEventListener('mouseup', stop); 
        document.addEventListener('touchend', stop);
    }

    function toggleSettings() { menu.style.display = (menu.style.display === "block") ? "none" : "block"; }
    function closeAllMenus() { menu.style.display = "none"; }
    function changeShape(s) { videoCont.style.borderRadius = s; }
    function resizeCam(v) { videoCont.style.width = v+"px"; videoCont.style.height = v+"px"; }
    function setBeauty(m) {
        videoElem.style.filter = (m==='on') ? "brightness(1.15) contrast(1.1) blur(0.3px)" : "none";
        document.getElementById('bOn').classList.toggle('active-btn', m==='on');
        document.getElementById('bOff').classList.toggle('active-btn', m==='off');
    }

    async function toggleCamera() {
        if(videoCont.style.display === "block") {
            videoCont.style.display = "none";
            if(mediaStream) { mediaStream.getTracks().forEach(track => track.stop()); mediaStream = null; }
            statusMsg.innerText = "✅ ক্যামেরা বন্ধ";
            setTimeout(() => statusMsg.innerText = "✅ প্রস্তুত | শব্দ অক্ষত রাখে", 1500);
        } else {
            videoCont.style.display = "block";
            try {
                const constraints = getVideoConstraints();
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                mediaStream = stream;
                videoElem.srcObject = stream;
                videoElem.style.transform = currentFacingMode === 'user' ? "scaleX(-1)" : "scaleX(1)";
                setTimeout(() => makeDraggable(videoCont), 100);
                statusMsg.innerText = "✅ ক্যামেরা চালু";
                setTimeout(() => statusMsg.innerText = "✅ প্রস্তুত | শব্দ অক্ষত রাখে", 1500);
            } catch(err) { alert("ক্যামেরা অ্যাক্সেস প্রয়োজন!"); videoCont.style.display = "none"; }
        }
    }

    function updateTimerDisplay() {
        if(activeRecordings === 0) {
            timerDisplay.style.display = 'none';
            return;
        }
        
        let currentTime = 0;
        if(isCameraRecording && !isCameraPaused) {
            currentTime = Date.now() - cameraStartTime - cameraPausedDuration;
        } 
        else if(isTextRecording && !isTextPaused) {
            currentTime = Date.now() - textStartTime - textPausedDuration;
        }
        else if(isCameraRecording && isCameraPaused) {
            currentTime = (cameraStartTime ? (Date.now() - cameraStartTime - cameraPausedDuration) : 0);
        }
        else if(isTextRecording && isTextPaused) {
            currentTime = (textStartTime ? (Date.now() - textStartTime - textPausedDuration) : 0);
        }
        
        const h = Math.floor(currentTime / 3600000);
        const m = Math.floor((currentTime % 3600000) / 60000);
        const s = Math.floor((currentTime % 60000) / 1000);
        timerDisplay.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        timerDisplay.style.display = 'block';
    }

    function startTimer() {
        if(timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(updateTimerDisplay, 200);
    }

    function stopTimer() {
        if(timerInterval) clearInterval(timerInterval);
        if(activeRecordings === 0) timerDisplay.style.display = 'none';
    }

    // ক্যামেরা রেকর্ড টগল
    async function toggleCameraRecording() {
        if(!mediaStream) {
            alert("ক্যামেরা অন করুন!");
            return;
        }
        
        if(!isCameraRecording) {
            cameraChunks = [];
            const mimeType = getMimeType();
            cameraRecorder = new MediaRecorder(mediaStream, { mimeType: mimeType });
            cameraRecorder.ondataavailable = e => { if(e.data.size > 0) cameraChunks.push(e.data); };
            cameraRecorder.onstop = () => {
                const blob = new Blob(cameraChunks, { type: 'video/mp4' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                const timestamp = new Date().toISOString().slice(0,19).replace(/:/g, '-');
                const camType = currentFacingMode === 'user' ? 'front' : 'back';
                a.download = `camera_${camType}_${timestamp}.mp4`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                statusMsg.innerText = "✅ ক্যামেরা MP4 সেভ হয়েছে";
                setTimeout(() => statusMsg.innerText = "✅ প্রস্তুত | শব্দ অক্ষত রাখে", 1500);
                cameraChunks = [];
                isCameraRecording = false;
                isCameraPaused = false;
                activeRecordings--;
                if(activeRecordings === 0) stopTimer();
                updateButtonStyles();
            };
            cameraRecorder.start(1000);
            isCameraRecording = true;
            isCameraPaused = false;
            cameraStartTime = Date.now();
            cameraPausedDuration = 0;
            activeRecordings++;
            startTimer();
            camRecBtn.classList.add('recording-active');
            camRecBtn.classList.remove('paused-state');
            statusMsg.innerText = "📹 ক্যামেরা রেকর্ডিং চলছে...";
            setTimeout(() => statusMsg.innerText = "✅ প্রস্তুত | শব্দ অক্ষত রাখে", 1500);
        } else {
            if(!isCameraPaused) {
                if(cameraRecorder && cameraRecorder.state === "recording") {
                    cameraRecorder.pause();
                }
                isCameraPaused = true;
                cameraCurrentPauseStart = Date.now();
                camRecBtn.classList.add('paused-state');
                camRecBtn.classList.remove('recording-active');
                statusMsg.innerText = "⏸️ ক্যামেরা পজ";
                setTimeout(() => statusMsg.innerText = "✅ প্রস্তুত | শব্দ অক্ষত রাখে", 1500);
            } else {
                if(cameraRecorder && cameraRecorder.state === "paused") {
                    cameraRecorder.resume();
                }
                if(cameraCurrentPauseStart > 0) {
                    cameraPausedDuration += (Date.now() - cameraCurrentPauseStart);
                    cameraCurrentPauseStart = 0;
                }
                isCameraPaused = false;
                camRecBtn.classList.remove('paused-state');
                camRecBtn.classList.add('recording-active');
                statusMsg.innerText = "▶️ ক্যামেরা রিজিউম";
                setTimeout(() => statusMsg.innerText = "✅ প্রস্তুত | শব্দ অক্ষত রাখে", 1500);
            }
        }
        updateButtonStyles();
    }

    // ========== টেক্সট রেকর্ড - শব্দ অক্ষত রাখার জন্য উন্নত ==========
    async function toggleTextRecording() {
        if(!isTextRecording) {
            textChunks = [];
            if(!textCanvas) {
                textCanvas = document.createElement('canvas');
                textCanvas.style.position = 'fixed';
                textCanvas.style.top = '-1000px';
                textCanvas.style.left = '-1000px';
                document.body.appendChild(textCanvas);
            }
            
            function drawTextFrame() {
                if(!textCanvas) return;
                const newRect = displayArea.getBoundingClientRect();
                if(textCanvas.width !== newRect.width || textCanvas.height !== newRect.height) {
                    textCanvas.width = newRect.width;
                    textCanvas.height = newRect.height;
                }
                const ctx = textCanvas.getContext('2d');
                ctx.clearRect(0, 0, textCanvas.width, textCanvas.height);
                ctx.fillStyle = "#000";
                ctx.fillRect(0, 0, textCanvas.width, textCanvas.height);
                
                const textDiv = scrollText;
                const textRect = textDiv.getBoundingClientRect();
                const textY = textRect.top - newRect.top;
                const cs = window.getComputedStyle(textDiv);
                
                // টেক্সটের আসল কন্টেন্ট (লাইন ব্রেক সহ)
                const fullText = textDiv.innerText;
                const originalLines = fullText.split('\n');
                
                const fontSize = parseInt(cs.fontSize);
                const lineHeight = fontSize * 1.4;
                const fontFamily = cs.fontFamily;
                
                ctx.font = `${fontSize}px ${fontFamily}`;
                ctx.fillStyle = cs.color;
                ctx.textAlign = "center";
                ctx.shadowBlur = 2;
                ctx.shadowColor = "black";
                
                const maxWidth = textCanvas.width - 60; // মার্জিন সহ
                let currentYPos = textY;
                
                for(let lineIndex = 0; lineIndex < originalLines.length; lineIndex++) {
                    let line = originalLines[lineIndex];
                    
                    // শব্দ ভাঙা রোধ করে লাইন র‍্যাপ করা
                    const words = line.split(' ');
                    let currentLine = '';
                    let wrappedLines = [];
                    
                    for(let i = 0; i < words.length; i++) {
                        const word = words[i];
                        const testLine = currentLine ? currentLine + ' ' + word : word;
                        const metrics = ctx.measureText(testLine);
                        
                        if(metrics.width > maxWidth && currentLine !== '') {
                            wrappedLines.push(currentLine);
                            currentLine = word;
                        } else {
                            currentLine = testLine;
                        }
                    }
                    if(currentLine) {
                        wrappedLines.push(currentLine);
                    }
                    
                    // ড্র করা
                    for(let w = 0; w < wrappedLines.length; w++) {
                        const yPos = currentYPos + (w * lineHeight) + fontSize;
                        ctx.fillText(wrappedLines[w], textCanvas.width / 2, yPos);
                    }
                    
                    // পরবর্তী লাইনের জন্য Y পজিশন আপডেট
                    currentYPos += (wrappedLines.length * lineHeight);
                }
                
                textAnimationId = requestAnimationFrame(drawTextFrame);
            }
            
            drawTextFrame();
            
            textStream = textCanvas.captureStream(30);
            const mimeType = getMimeType();
            textRecorder = new MediaRecorder(textStream, { mimeType: mimeType });
            textRecorder.ondataavailable = e => { if(e.data.size > 0) textChunks.push(e.data); };
            textRecorder.onstop = () => {
                if(textAnimationId) cancelAnimationFrame(textAnimationId);
                const blob = new Blob(textChunks, { type: 'video/mp4' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `text_scroll_${Date.now()}.mp4`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                statusMsg.innerText = "✅ টেক্সট MP4 সেভ হয়েছে";
                setTimeout(() => statusMsg.innerText = "✅ প্রস্তুত | শব্দ অক্ষত রাখে", 1500);
                textChunks = [];
                isTextRecording = false;
                isTextPaused = false;
                activeRecordings--;
                if(activeRecordings === 0) stopTimer();
                updateButtonStyles();
            };
            textRecorder.start(1000);
            isTextRecording = true;
            isTextPaused = false;
            textStartTime = Date.now();
            textPausedDuration = 0;
            activeRecordings++;
            startTimer();
            textRecBtn.classList.add('recording-active');
            textRecBtn.classList.remove('paused-state');
            statusMsg.innerText = "📝 টেক্সট রেকর্ডিং চলছে...";
            setTimeout(() => statusMsg.innerText = "✅ প্রস্তুত | শব্দ অক্ষত রাখে", 1500);
        } else {
            if(!isTextPaused) {
                if(textRecorder && textRecorder.state === "recording") {
                    textRecorder.pause();
                }
                isTextPaused = true;
                textCurrentPauseStart = Date.now();
                textRecBtn.classList.add('paused-state');
                textRecBtn.classList.remove('recording-active');
                statusMsg.innerText = "⏸️ টেক্সট পজ";
                setTimeout(() => statusMsg.innerText = "✅ প্রস্তুত | শব্দ অক্ষত রাখে", 1500);
            } else {
                if(textRecorder && textRecorder.state === "paused") {
                    textRecorder.resume();
                }
                if(textCurrentPauseStart > 0) {
                    textPausedDuration += (Date.now() - textCurrentPauseStart);
                    textCurrentPauseStart = 0;
                }
                isTextPaused = false;
                textRecBtn.classList.remove('paused-state');
                textRecBtn.classList.add('recording-active');
                statusMsg.innerText = "▶️ টেক্সট রিজিউম";
                setTimeout(() => statusMsg.innerText = "✅ প্রস্তুত | শব্দ অক্ষত রাখে", 1500);
            }
        }
        updateButtonStyles();
    }
    
    function stopRecording() {
        let stopped = false;
        if(isCameraRecording && cameraRecorder && (cameraRecorder.state === "recording" || cameraRecorder.state === "paused")) {
            cameraRecorder.stop();
            stopped = true;
        }
        if(isTextRecording && textRecorder && (textRecorder.state === "recording" || textRecorder.state === "paused")) {
            textRecorder.stop();
            stopped = true;
        }
        if(stopped) {
            statusMsg.innerText = "💾 MP4 সংরক্ষণ করা হচ্ছে...";
        } else {
            alert("কোনো রেকর্ডিং নেই!");
        }
    }
    
    function updateButtonStyles() {
        if(isCameraRecording) {
            if(isCameraPaused) {
                camRecBtn.classList.add('paused-state');
                camRecBtn.classList.remove('recording-active');
            } else {
                camRecBtn.classList.add('recording-active');
                camRecBtn.classList.remove('paused-state');
            }
        } else {
            camRecBtn.classList.remove('recording-active');
            camRecBtn.classList.remove('paused-state');
        }
        
        if(isTextRecording) {
            if(isTextPaused) {
                textRecBtn.classList.add('paused-state');
                textRecBtn.classList.remove('recording-active');
            } else {
                textRecBtn.classList.add('recording-active');
                textRecBtn.classList.remove('paused-state');
            }
        } else {
            textRecBtn.classList.remove('recording-active');
            textRecBtn.classList.remove('paused-state');
        }
    }
    
    // ইনিশিয়ালাইজ
    resizeText(32);
    updateLiveText();
    
    setTimeout(() => {
        videoCont.style.left = 'auto';
        videoCont.style.right = '20px';
        videoCont.style.top = '180px';
    }, 100);
</script>
