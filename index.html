<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রো টেলিপম্পটার V6</title>
    <style>
        body {
            margin: 0; background-color: #000; color: #fff;
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
            display: flex; flex-direction: column; height: 100vh;
        }

        /* কন্ট্রোল প্যানেল */
        #controls {
            padding: 10px; background: #1a1a1a; display: flex;
            flex-direction: column; align-items: center; gap: 10px;
            z-index: 2000; border-bottom: 2px solid #333;
        }

        textarea {
            width: 90%; max-width: 500px; height: 40px; background: #222;
            color: #0f0; border: 1px solid #444; padding: 8px; border-radius: 8px; text-align: center;
        }

        .main-buttons { display: flex; gap: 8px; justify-content: center; position: relative; }

        /* সেটিংস মেনু */
        #dropdown-menu {
            display: none; position: absolute; background-color: #222;
            min-width: 220px; box-shadow: 0px 8px 20px rgba(0,0,0,0.8);
            padding: 15px; z-index: 3000; border-radius: 12px;
            top: 45px; left: 50%; transform: translateX(-50%); border: 1px solid #444;
        }

        .setting-item { margin-bottom: 12px; display: flex; flex-direction: column; gap: 8px; border-bottom: 1px solid #333; padding-bottom: 10px; }

        /* ক্যামেরা */
        #video-container {
            position: absolute; top: 180px; right: 20px; width: 140px; height: 140px;
            border: 3px solid #007bff; border-radius: 50%; overflow: hidden;
            background: #222; z-index: 999; cursor: move; touch-action: none; display: none;
        }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        /* স্ক্রলিং টেক্সট এরিয়া */
        #display-area {
            flex-grow: 1; position: relative; overflow: hidden;
            cursor: grab; touch-action: none; /* টেনে নামানোর জন্য জরুরি */
        }
        #scrolling-text {
            position: absolute; left: 50%; transform: translateX(-50%);
            width: 90%; text-align: center; font-size: 30px; font-weight: bold;
            line-height: 1.5; pointer-events: none; user-select: none;
        }

        button { padding: 8px 15px; cursor: pointer; border-radius: 20px; border: none; background: #007bff; color: white; font-weight: bold; font-size: 13px; }
        .btn-settings { background: #6c757d; }
        .btn-cam { background: #28a745; }
        .btn-hide { background: #dc3545; }
        .btn-inner { background: #444; padding: 5px 12px; }
    </style>
</head>
<body onclick="closeSettings(event)">

<div id="controls">
    <textarea id="inputText" placeholder="আপনার স্ক্রিপ্ট পেস্ট করুন..."></textarea>
    <div class="main-buttons">
        <button onclick="startScroll()">শুরু</button>
        <button class="btn-cam" onclick="toggleCamera()">ক্যামেরা</button>
        <button class="btn-hide" onclick="hideCamera()">হাইড</button>
        <div style="position: relative;">
            <button class="btn-settings" onclick="toggleSettings(event)">সেটিংস ⚙️</button>
            <div id="dropdown-menu" onclick="event.stopPropagation()">
                <div class="setting-item">
                    <span>টেক্সট সাইজ:</span>
                    <div style="display:flex; gap:10px;">
                        <button class="btn-inner" onclick="changeFontSize(4)">A +</button>
                        <button class="btn-inner" onclick="changeFontSize(-4)">A -</button>
                    </div>
                </div>
                <div class="setting-item">
                    <span>ক্যামেরা সাইজ:</span>
                    <div style="display:flex; gap:10px;">
                        <button class="btn-inner" onclick="changeCamSize(20)">C +</button>
                        <button class="btn-inner" onclick="changeCamSize(-20)">C -</button>
                    </div>
                </div>
                <div class="setting-item">
                    <span>গতি:</span>
                    <input type="range" id="speedRange" min="0.5" max="10" step="0.5" value="2">
                </div>
            </div>
        </div>
    </div>
</div>

<div id="video-container" onmousedown="dragStartCam(event)" ontouchstart="dragStartCam(event)">
    <video id="webcam" autoplay playsinline muted></video>
</div>

<div id="display-area" onmousedown="dragStartText(event)" ontouchstart="dragStartText(event)">
    <div id="scrolling-text" id="scrollContent">এখানে লেখা আসবে...</div>
</div>

<script>
    let scrollInterval, isPaused = true, currentY = 0;
    let currentFontSize = 30, currentCamSize = 140;
    let isDraggingText = false, startY;

    const scrollText = document.getElementById('scrolling-text');
    const speedInput = document.getElementById('speedRange');
    const displayArea = document.getElementById('display-area');
    const videoCont = document.getElementById('video-container');
    const videoElem = document.getElementById('webcam');
    const menu = document.getElementById('dropdown-menu');

    // ১. টেক্সট ড্র্যাগ এবং পজ কন্ট্রোল
    function dragStartText(e) {
        if (menu.style.display === "block") { menu.style.display = "none"; return; }
        
        isPaused = true; // টাচ করলে থেমে যাবে
        isDraggingText = true;
        let ev = e.type === 'touchstart' ? e.touches[0] : e;
        startY = ev.clientY - currentY;

        document.onmousemove = dragText;
        document.ontouchmove = dragText;
        document.onmouseup = dragEndText;
        document.ontouchend = dragEndText;
    }

    function dragText(e) {
        if (!isDraggingText) return;
        let ev = e.type === 'touchmove' ? e.touches[0] : e;
        currentY = ev.clientY - startY; // টেনে নিচে নামানো
        scrollText.style.top = currentY + "px";
    }

    function dragEndText() {
        isDraggingText = false;
        isPaused = false; // ছেড়ে দিলে আবার চলতে থাকবে
        document.onmousemove = null; document.ontouchmove = null;
    }

    // ২. অটো স্ক্রলিং ফাংশন
    function startScroll() {
        const text = document.getElementById('inputText').value;
        if(!text) return alert("স্ক্রিপ্ট দিন!");
        scrollText.innerText = text;
        currentY = displayArea.offsetHeight;
        isPaused = false;
        if(scrollInterval) clearInterval(scrollInterval);
        scrollInterval = setInterval(() => {
            if (!isPaused && !isDraggingText) {
                currentY -= parseFloat(speedInput.value);
                scrollText.style.top = currentY + "px";
                if (currentY < -scrollText.offsetHeight) currentY = displayArea.offsetHeight;
            }
        }, 25);
    }

    // ৩. সেটিংস ও ক্যামেরা কন্ট্রোল
    function toggleSettings(e) { e.stopPropagation(); menu.style.display = (menu.style.display === "block") ? "none" : "block"; }
    function closeSettings(e) { if (menu.style.display === "block") menu.style.display = "none"; }
    function changeFontSize(amount) { currentFontSize += amount; scrollText.style.fontSize = currentFontSize + "px"; }
    function changeCamSize(amount) {
        currentCamSize += amount;
        if(currentCamSize > 50 && currentCamSize < 500) {
            videoCont.style.width = currentCamSize + "px"; videoCont.style.height = currentCamSize + "px";
        }
    }

    async function toggleCamera() {
    if (videoCont.style.display === "block") {
        // ক্যামেরা অফ করা
        videoCont.style.display = "none";
        if(videoElem.srcObject) { 
            videoElem.srcObject.getTracks().forEach(t => t.stop()); 
            videoElem.srcObject = null; 
        }
    } else {
        // ক্যামেরা অন করা
        videoCont.style.display = "block";
        try {
            // ব্রাউজারকে স্পষ্টভাবে ক্যামেরা রিকোয়েস্ট পাঠানো
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { 
                    facingMode: "user", // সামনের ক্যামেরা
                    width: { ideal: 400 },
                    height: { ideal: 400 }
                } 
            });
            videoElem.srcObject = stream;
            videoElem.play(); // নিশ্চিতভাবে প্লে করা
        } catch (err) { 
            console.error(err);
            alert("ক্যামেরা এক্সেস রিজেক্ট করা হয়েছে। ব্রাউজার সেটিংস থেকে ক্যামেরা Allow করুন।"); 
        }
    }
}

    function hideCamera() { videoCont.style.display = (videoCont.style.display === "none") ? "block" : "none"; }

    // ক্যামেরা ড্র্যাগিং (Moveable Camera)
    let camActive = false, camInitX, camInitY;
    function dragStartCam(e) {
        let ev = e.type === 'touchstart' ? e.touches[0] : e;
        camInitX = ev.clientX - videoCont.offsetLeft;
        camInitY = ev.clientY - videoCont.offsetTop;
        camActive = true;
        document.onmousemove = dragCam; document.ontouchmove = dragCam;
        document.onmouseup = dragEndCam; document.ontouchend = dragEndCam;
    }
    function dragCam(e) {
        if (camActive) {
            let ev = e.type === 'touchmove' ? e.touches[0] : e;
            videoCont.style.left = (ev.clientX - camInitX) + "px";
            videoCont.style.top = (ev.clientY - camInitY) + "px";
            videoCont.style.right = "auto";
        }
    }
    function dragEndCam() { camActive = false; }
</script>

</body>
</html>
