<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI প্রো টেলিপম্পটার V23 - ড্র্যাগেবল ক্যামেরা</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            margin: 0; background-color: #000; color: #fff;
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
            display: flex; flex-direction: column; height: 100vh;
        }

        #controls {
            padding: 12px; background: #1a1a1a; display: flex;
            flex-direction: column; align-items: center; gap: 12px;
            z-index: 2000; border-bottom: 2px solid #333;
        }

        textarea {
            width: 90%; max-width: 550px; height: 50px; background: #222;
            color: #0f0; border: 1px solid #444; padding: 10px; border-radius: 10px;
            font-size: 14px; outline: none;
        }

        .main-buttons { display: flex; gap: 10px; justify-content: center; position: relative; }

        #dropdown-menu {
            display: none; position: absolute; background-color: #222;
            width: 280px; box-shadow: 0px 10px 30px rgba(0,0,0,0.9);
            padding: 20px; z-index: 3000; border-radius: 15px;
            top: 55px; left: 50%; transform: translateX(-50%); border: 1px solid #444;
        }

        .setting-item { margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .setting-label { display: block; margin-bottom: 8px; font-size: 13px; color: #bbb; }
        .btn-group { display: flex; gap: 8px; }

        #video-container {
            position: absolute; top: 180px; right: 20px; 
            width: 150px; height: 150px; border: 3px solid #007bff;
            border-radius: 50%; overflow: hidden; background: #222; z-index: 999;
            cursor: grab; touch-action: none; display: none;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            transition: box-shadow 0.2s;
        }
        #video-container:active {
            cursor: grabbing;
        }
        video { 
            width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); 
            pointer-events: none;
        }
        
        /* ড্র্যাগ হ্যান্ডেল - পুরো ক্যামেরা এলাকা */
        .drag-handle {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.05);
            cursor: grab;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .drag-handle:active {
            cursor: grabbing;
        }
        .drag-handle::after {
            content: "⋮⋮";
            position: absolute;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
            color: rgba(255,255,255,0.7);
            background: rgba(0,0,0,0.5);
            padding: 2px 8px;
            border-radius: 20px;
            pointer-events: none;
        }

        #display-area { 
            flex-grow: 1; position: relative; overflow: hidden; background: #000; 
            cursor: grab; 
        }
        #display-area:active {
            cursor: grabbing;
        }
        #scrolling-text {
            position: absolute; left: 50%; transform: translateX(-50%);
            width: 92%; text-align: center; font-size: 30px; font-weight: bold;
            line-height: 1.6; pointer-events: none; user-select: none; white-space: pre-wrap;
            top: 100px;
        }

        .rec-container {
            position: fixed; bottom: 30px; right: 30px;
            display: flex; flex-direction: row-reverse; align-items: center; gap: 12px; z-index: 5000;
        }
        #timer {
            position: absolute; bottom: 80px; right: 0; color: #ff3333;
            font-family: monospace; font-size: 20px; font-weight: bold; display: none;
            background: rgba(0,0,0,0.8); padding: 5px 12px; border-radius: 8px;
        }
        .sub-rec-btn {
            width: 48px; height: 48px; border-radius: 50%; border: 2px solid white;
            display: none; align-items: center; justify-content: center; cursor: pointer;
            font-size: 20px;
            transition: transform 0.1s;
        }
        .sub-rec-btn:active {
            transform: scale(0.92);
        }
        #main-rec-btn {
            width: 60px; height: 60px; background: red; border-radius: 50%;
            border: 3px solid white; display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 0 15px rgba(255,0,0,0.4);
            font-size: 24px;
            transition: transform 0.1s;
        }
        #main-rec-btn:active {
            transform: scale(0.94);
        }
        .recording-active {
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        button { padding: 10px 15px; cursor: pointer; border-radius: 20px; border: none; font-weight: bold; font-size: 13px; color: white; }
        .btn-blue { background: #007bff; }
        .btn-green { background: #28a745; }
        .btn-gray { background: #555; width: 100%; }
        .btn-inner { background: #444; flex: 1; }
        .active-btn { background: #f39c12 !important; }
        input[type="range"] { width: 100%; accent-color: #007bff; }
        
        .status-msg {
            position: fixed;
            bottom: 100px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #0f0;
            z-index: 5000;
        }
    </style>
</head>
<body onclick="closeAllMenus()">

<div id="controls">
    <textarea id="inputText" oninput="updateLiveText()" placeholder="আপনার স্ক্রিপ্ট এখানে পেস্ট করুন..."></textarea>
    <div class="main-buttons">
        <button class="btn-blue" onclick="refreshAndStartScroll()">শুরু</button>
        <button class="btn-green" onclick="toggleCamera()">ক্যামেরা</button>
        <div style="position: relative;" onclick="event.stopPropagation()">
            <button class="btn-gray" onclick="toggleSettings()">সেটিংস ⚙️</button>
            <div id="dropdown-menu">
                <div class="setting-item">
                    <span class="setting-label">বিউটি মোড</span>
                    <div class="btn-group">
                        <button id="bOff" class="btn-inner active-btn" onclick="setBeauty('off')">Off</button>
                        <button id="bOn" class="btn-inner" onclick="setBeauty('on')">স্মুথ ✨</button>
                    </div>
                </div>
                <div class="setting-item">
                    <span class="setting-label">ক্যামেরা শেপ</span>
                    <div class="btn-group">
                        <button class="btn-inner" onclick="changeShape('50%')">গোল</button>
                        <button class="btn-inner" onclick="changeShape('12px')">চৌকো</button>
                    </div>
                </div>
                <div class="setting-item">
                    <span class="setting-label">টেক্সট সাইজ</span>
                    <input type="range" id="textSizeRange" min="15" max="100" value="30" oninput="resizeText(this.value)">
                </div>
                <div class="setting-item">
                    <span class="setting-label">ক্যামেরা সাইজ</span>
                    <input type="range" id="camSizeRange" min="80" max="600" value="150" oninput="resizeCam(this.value)">
                </div>
                <div class="setting-item">
                    <span class="setting-label">স্ক্রলিং গতি</span>
                    <input type="range" id="speedRange" min="0.5" max="15" step="0.5" value="2">
                </div>
            </div>
        </div>
    </div>
</div>

<div id="video-container">
    <div class="drag-handle"></div>
    <video id="webcam" autoplay playsinline muted></video>
</div>

<div class="rec-container" onclick="event.stopPropagation()">
    <div id="timer">00:00:00</div>
    <div id="main-rec-btn" onclick="toggleRecMenu()">⏺️</div>
    <div id="start-cam-btn" class="sub-rec-btn" style="background:#dc3545;" onclick="startCameraRecord()">📹</div>
    <div id="start-text-btn" class="sub-rec-btn" style="background:#28a745;" onclick="startTextRecord()">📝</div>
    <div id="pause-btn" class="sub-rec-btn" style="background:#e67e22;" onclick="pauseRecording()">⏸️</div>
    <div id="save-btn" class="sub-rec-btn" style="background:#007bff;" onclick="stopRecording()">💾</div>
</div>

<div id="display-area" onmousedown="dragTextStart(event)" ontouchstart="dragTextStart(event)">
    <div id="scrolling-text">এখানে আপনার স্ক্রিপ্ট লিখুন...</div>
</div>

<div class="status-msg" id="statusMsg">✅ প্রস্তুত | ক্যামেরা ধরে টেনে সরান</div>

<script>
    // DOM elements
    const scrollText = document.getElementById('scrolling-text');
    const videoElem = document.getElementById('webcam');
    const videoCont = document.getElementById('video-container');
    const displayArea = document.getElementById('display-area');
    const menu = document.getElementById('dropdown-menu');
    const timerDisplay = document.getElementById('timer');
    const mainRecBtn = document.getElementById('main-rec-btn');
    const speedRange = document.getElementById('speedRange');
    const statusMsg = document.getElementById('statusMsg');

    // State variables
    let scrollInterval, isAutoScrolling = false, currentY = 100;
    let isMenuOpen = false;
    let mediaStream = null;
    
    // Camera recording
    let cameraRecorder = null;
    let cameraChunks = [];
    let isCameraRecording = false;
    
    // Text recording (screen capture)
    let textRecorder = null;
    let textChunks = [];
    let isTextRecording = false;
    let textStream = null;
    let textCanvas = null;
    let textAnimationId = null;
    
    let recordingStartTime = 0;
    let timerInterval = null;
    let activeRecordings = 0;

    // ============ ক্যামেরা ড্র্যাগ ফাংশন (সহজ ও কার্যকর) ============
    function makeDraggable(element) {
        let isDragging = false;
        let startX, startY, initialLeft, initialTop;
        
        // মাউস/টাচ ইভেন্ট হ্যান্ডলার
        const onMouseDown = (e) => {
            e.preventDefault();
            e.stopPropagation();
            isDragging = true;
            
            // পজিশন ক্যালকুলেশন
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            // বর্তমান পজিশন বের করা
            const rect = element.getBoundingClientRect();
            const currentLeft = rect.left;
            const currentTop = rect.top;
            
            startX = clientX - currentLeft;
            startY = clientY - currentTop;
            
            // স্টাইল ঠিক রাখা
            element.style.right = 'auto';
            element.style.bottom = 'auto';
            
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
            document.addEventListener('touchmove', onMouseMove, { passive: false });
            document.addEventListener('touchend', onMouseUp);
        };
        
        const onMouseMove = (e) => {
            if (!isDragging) return;
            e.preventDefault();
            
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            let newLeft = clientX - startX;
            let newTop = clientY - startY;
            
            // স্ক্রিনের বাইরে চলে যেতে দেব না
            newLeft = Math.max(5, Math.min(window.innerWidth - element.offsetWidth - 5, newLeft));
            newTop = Math.max(5, Math.min(window.innerHeight - element.offsetHeight - 100, newTop));
            
            element.style.left = newLeft + 'px';
            element.style.top = newTop + 'px';
        };
        
        const onMouseUp = () => {
            isDragging = false;
            document.removeEventListener('mousemove', onMouseMove);
            document.removeEventListener('mouseup', onMouseUp);
            document.removeEventListener('touchmove', onMouseMove);
            document.removeEventListener('touchend', onMouseUp);
        };
        
        element.addEventListener('mousedown', onMouseDown);
        element.addEventListener('touchstart', onMouseDown, { passive: false });
    }

    // Text functions
    function updateLiveText() {
        let text = document.getElementById('inputText').value;
        scrollText.innerText = text ? text : "এখানে আপনার স্ক্রিপ্ট লিখুন...";
        if(!isAutoScrolling) { 
            currentY = 100; 
            scrollText.style.top = currentY + "px"; 
        }
    }

    function refreshAndStartScroll() {
        if(!document.getElementById('inputText').value) return alert("আগে স্ক্রিপ্ট লিখুন!");
        currentY = displayArea.offsetHeight; 
        scrollText.style.top = currentY + "px";
        isAutoScrolling = true;
        if(scrollInterval) clearInterval(scrollInterval);
        
        scrollInterval = setInterval(() => {
            if(isAutoScrolling) {
                currentY -= parseFloat(speedRange.value);
                scrollText.style.top = currentY + "px";
                if(currentY < -scrollText.offsetHeight) {
                    currentY = displayArea.offsetHeight;
                }
            }
        }, 25);
    }

    // Drag text manually (stops auto scroll)
    function dragTextStart(e) {
        isAutoScrolling = false;
        let ev = e.touches ? e.touches[0] : e;
        let sY = ev.clientY - currentY;
        function move(e) {
            let ev2 = e.touches ? e.touches[0] : e;
            currentY = ev2.clientY - sY;
            scrollText.style.top = currentY + "px";
        }
        function stop() { 
            document.removeEventListener('mousemove', move); 
            document.removeEventListener('touchmove', move); 
        }
        document.addEventListener('mousemove', move); 
        document.addEventListener('touchmove', move, {passive: false});
        document.addEventListener('mouseup', stop); 
        document.addEventListener('touchend', stop);
    }

    // Settings functions
    function toggleSettings() { menu.style.display = (menu.style.display === "block") ? "none" : "block"; }
    function closeAllMenus() { menu.style.display = "none"; }
    function resizeText(v) { scrollText.style.fontSize = v + "px"; }
    function changeShape(s) { videoCont.style.borderRadius = s; }
    function resizeCam(v) { 
        videoCont.style.width = v+"px"; 
        videoCont.style.height = v+"px"; 
    }
    function setBeauty(m) {
        videoElem.style.filter = (m==='on') ? "brightness(1.2) contrast(1.1) blur(0.4px)" : "none";
        document.getElementById('bOn').classList.toggle('active-btn', m==='on');
        document.getElementById('bOff').classList.toggle('active-btn', m==='off');
    }
    
    function toggleRecMenu() {
        isMenuOpen = !isMenuOpen;
        document.querySelectorAll('.sub-rec-btn').forEach(b => b.style.display = isMenuOpen ? 'flex' : 'none');
    }

    // Camera functions
    async function toggleCamera() {
        if(videoCont.style.display === "block") {
            videoCont.style.display = "none";
            if(mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }
            statusMsg.innerText = "✅ ক্যামেরা বন্ধ";
            setTimeout(() => statusMsg.innerText = "✅ প্রস্তুত | ক্যামেরা ধরে টেনে সরান", 2000);
        } else {
            videoCont.style.display = "block";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
                mediaStream = stream;
                videoElem.srcObject = stream;
                // ক্যামেরা ড্র্যাগ সেটআপ
                setTimeout(() => {
                    makeDraggable(videoCont);
                    statusMsg.innerText = "✅ ক্যামেরা চালু | ধরে টেনে সরান";
                }, 100);
                setTimeout(() => statusMsg.innerText = "✅ প্রস্তুত | ক্যামেরা ধরে টেনে সরান", 2000);
            } catch(err) {
                console.error("Camera error:", err);
                alert("ক্যামেরা অ্যাক্সেস প্রয়োজন!");
                videoCont.style.display = "none";
            }
        }
    }

    // Timer update
    function updateTimerUI() {
        if(activeRecordings === 0) {
            timerDisplay.style.display = 'none';
            return;
        }
        const elapsed = Date.now() - recordingStartTime;
        const hours = Math.floor(elapsed / 3600000);
        const minutes = Math.floor((elapsed % 3600000) / 60000);
        const seconds = Math.floor((elapsed % 60000) / 1000);
        timerDisplay.innerText = `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
    }

    function startTimer() {
        if(timerInterval) clearInterval(timerInterval);
        timerDisplay.style.display = 'block';
        timerInterval = setInterval(updateTimerUI, 200);
    }

    function stopTimer() {
        if(timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        if(activeRecordings === 0) {
            timerDisplay.style.display = 'none';
            timerDisplay.innerText = "00:00:00";
        }
    }

    // Camera Recording (only camera + audio)
    async function startCameraRecord() {
        if(!mediaStream) {
            alert("দয়া করে ক্যামেরা অন করুন!");
            return;
        }
        if(isCameraRecording) {
            alert("ক্যামেরা রেকর্ডিং ইতিমধ্যে চলছে!");
            return;
        }
        
        cameraChunks = [];
        cameraRecorder = new MediaRecorder(mediaStream, { mimeType: 'video/webm' });
        cameraRecorder.ondataavailable = (event) => {
            if(event.data.size > 0) cameraChunks.push(event.data);
        };
        cameraRecorder.onstop = () => {
            const blob = new Blob(cameraChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `camera_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.webm`;
            a.click();
            URL.revokeObjectURL(url);
            statusMsg.innerText = "✅ ক্যামেরা ভিডিও সেভ হয়েছে";
            setTimeout(() => statusMsg.innerText = "✅ প্রস্তুত | ক্যামেরা ধরে টেনে সরান", 2000);
            cameraChunks = [];
            isCameraRecording = false;
            activeRecordings--;
            if(activeRecordings === 0) stopTimer();
            updateRecordButtonStatus();
        };
        
        cameraRecorder.start(1000);
        isCameraRecording = true;
        activeRecordings++;
        if(activeRecordings === 1) {
            recordingStartTime = Date.now();
            startTimer();
        }
        updateRecordButtonStatus();
        statusMsg.innerText = "📹 ক্যামেরা রেকর্ডিং শুরু";
        setTimeout(() => statusMsg.innerText = "✅ প্রস্তুত | ক্যামেরা ধরে টেনে সরান", 2000);
    }

    // Text Recording (screen capture of display area)
    async function startTextRecord() {
        if(isTextRecording) {
            alert("টেক্সট রেকর্ডিং ইতিমধ্যে চলছে!");
            return;
        }
        
        textChunks = [];
        
        // Create canvas for text area capture
        if(!textCanvas) {
            textCanvas = document.createElement('canvas');
            textCanvas.style.position = 'fixed';
            textCanvas.style.top = '-1000px';
            textCanvas.style.left = '-1000px';
            document.body.appendChild(textCanvas);
        }
        
        const rect = displayArea.getBoundingClientRect();
        textCanvas.width = rect.width;
        textCanvas.height = rect.height;
        const ctx = textCanvas.getContext('2d');
        
        function drawTextFrame() {
            if(!textCanvas) return;
            const newRect = displayArea.getBoundingClientRect();
            if(textCanvas.width !== newRect.width || textCanvas.height !== newRect.height) {
                textCanvas.width = newRect.width;
                textCanvas.height = newRect.height;
            }
            
            ctx.clearRect(0, 0, textCanvas.width, textCanvas.height);
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, textCanvas.width, textCanvas.height);
            
            // Draw scrolling text
            const textDiv = scrollText;
            const textRect = textDiv.getBoundingClientRect();
            const textX = textRect.left - newRect.left;
            const textY = textRect.top - newRect.top;
            
            const computedStyle = window.getComputedStyle(textDiv);
            ctx.font = computedStyle.fontSize + " " + computedStyle.fontFamily;
            ctx.fillStyle = computedStyle.color;
            ctx.textAlign = "center";
            ctx.shadowBlur = 2;
            ctx.shadowColor = "black";
            
            const lines = textDiv.innerText.split('\n');
            let lineHeight = parseInt(computedStyle.fontSize) * 1.3;
            for(let i = 0; i < lines.length; i++) {
                ctx.fillText(lines[i], textCanvas.width/2, textY + (i * lineHeight) + parseInt(computedStyle.fontSize));
            }
            
            // Draw timer on text recording
            if(timerDisplay.style.display === 'block') {
                ctx.font = "bold 20px monospace";
                ctx.fillStyle = "#ffaa44";
                ctx.textAlign = "right";
                ctx.fillText(timerDisplay.innerText, textCanvas.width - 20, 40);
                ctx.textAlign = "center";
            }
            
            textAnimationId = requestAnimationFrame(drawTextFrame);
        }
        
        drawTextFrame();
        
        textStream = textCanvas.captureStream(30);
        textRecorder = new MediaRecorder(textStream, { mimeType: 'video/webm' });
        textRecorder.ondataavailable = (event) => {
            if(event.data.size > 0) textChunks.push(event.data);
        };
        textRecorder.onstop = () => {
            if(textAnimationId) {
                cancelAnimationFrame(textAnimationId);
                textAnimationId = null;
            }
            const blob = new Blob(textChunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `text_scroll_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.webm`;
            a.click();
            URL.revokeObjectURL(url);
            statusMsg.innerText = "✅ টেক্সট ভিডিও সেভ হয়েছে";
            setTimeout(() => statusMsg.innerText = "✅ প্রস্তুত | ক্যামেরা ধরে টেনে সরান", 2000);
            textChunks = [];
            isTextRecording = false;
            activeRecordings--;
            if(activeRecordings === 0) stopTimer();
            updateRecordButtonStatus();
        };
        
        textRecorder.start(1000);
        isTextRecording = true;
        activeRecordings++;
        if(activeRecordings === 1) {
            recordingStartTime = Date.now();
            startTimer();
        }
        updateRecordButtonStatus();
        statusMsg.innerText = "📝 টেক্সট রেকর্ডিং শুরু";
        setTimeout(() => statusMsg.innerText = "✅ প্রস্তুত | ক্যামেরা ধরে টেনে সরান", 2000);
    }
    
    function pauseRecording() {
        let paused = false;
        if(isCameraRecording && cameraRecorder && cameraRecorder.state === "recording") {
            cameraRecorder.pause();
            paused = true;
        }
        if(isTextRecording && textRecorder && textRecorder.state === "recording") {
            textRecorder.pause();
            paused = true;
        }
        
        if(paused) {
            statusMsg.innerText = "⏸️ রেকর্ডিং পaused";
            setTimeout(() => statusMsg.innerText = "✅ প্রস্তুত | ক্যামেরা ধরে টেনে সরান", 1500);
        } else if((isCameraRecording && cameraRecorder?.state === "paused") || 
                  (isTextRecording && textRecorder?.state === "paused")) {
            if(isCameraRecording && cameraRecorder.state === "paused") cameraRecorder.resume();
            if(isTextRecording && textRecorder.state === "paused") textRecorder.resume();
            statusMsg.innerText = "▶️ রেকর্ডিং resumed";
            setTimeout(() => statusMsg.innerText = "✅ প্রস্তুত | ক্যামেরা ধরে টেনে সরান", 1500);
        } else {
            alert("কোনো সক্রিয় রেকর্ডিং নেই!");
        }
    }
    
    function stopRecording() {
        let stopped = false;
        if(isCameraRecording && cameraRecorder && (cameraRecorder.state === "recording" || cameraRecorder.state === "paused")) {
            cameraRecorder.stop();
            stopped = true;
        }
        if(isTextRecording && textRecorder && (textRecorder.state === "recording" || textRecorder.state === "paused")) {
            textRecorder.stop();
            stopped = true;
        }
        
        if(stopped) {
            statusMsg.innerText = "💾 ভিডিও সংরক্ষণ করা হচ্ছে...";
        } else {
            alert("কোনো রেকর্ডিং চলছে না!");
        }
    }
    
    function updateRecordButtonStatus() {
        if(activeRecordings > 0) {
            mainRecBtn.classList.add('recording-active');
            mainRecBtn.innerText = '🔴';
        } else {
            mainRecBtn.classList.remove('recording-active');
            mainRecBtn.innerText = '⏺️';
        }
    }
    
    // Load default
    updateLiveText();
    resizeText(30);
    
    // ক্যামেরা ডিফল্ট পজিশন সেট
    setTimeout(() => {
        videoCont.style.left = 'auto';
        videoCont.style.right = '20px';
        videoCont.style.top = '180px';
    }, 100);
</script>
