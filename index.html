<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI প্রো টেলিপম্পটার V26 - MP4 রেকর্ড</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            margin: 0; background-color: #000; color: #fff;
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
            display: flex; flex-direction: column; height: 100vh;
        }

        #controls {
            padding: 10px; background: #1a1a1a; display: flex;
            flex-direction: column; align-items: center; gap: 8px;
            z-index: 2000; border-bottom: 2px solid #333;
        }

        textarea {
            width: 90%; max-width: 550px; height: 45px; background: #222;
            color: #0f0; border: 1px solid #444; padding: 8px; border-radius: 8px;
            font-size: 13px; outline: none;
        }

        .main-buttons { display: flex; gap: 8px; justify-content: center; position: relative; flex-wrap: wrap; }

        #dropdown-menu {
            display: none; position: absolute; background-color: #1e1e1e;
            width: 260px; box-shadow: 0px 10px 30px rgba(0,0,0,0.9);
            padding: 12px; z-index: 3000; border-radius: 12px;
            top: 50px; left: 50%; transform: translateX(-50%); border: 1px solid #444;
        }

        .setting-item { margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 8px; }
        .setting-label { display: block; margin-bottom: 5px; font-size: 12px; color: #bbb; }
        .btn-group { display: flex; gap: 6px; }

        #video-container {
            position: absolute; top: 180px; right: 20px; 
            width: 150px; height: 150px; border: 3px solid #007bff;
            border-radius: 50%; overflow: hidden; background: #222; z-index: 999;
            cursor: grab; touch-action: none; display: none;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        #video-container:active { cursor: grabbing; }
        video { 
            width: 100%; height: 100%; object-fit: cover; 
            pointer-events: none;
        }
        
        .drag-handle {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.05);
            cursor: grab;
            z-index: 10;
        }
        .drag-handle::after {
            content: "⋮⋮";
            position: absolute;
            top: 3px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            color: rgba(255,255,255,0.6);
            background: rgba(0,0,0,0.5);
            padding: 2px 6px;
            border-radius: 15px;
            pointer-events: none;
        }

        #display-area { 
            flex-grow: 1; position: relative; overflow: hidden; background: #000; 
            cursor: grab; 
        }
        #display-area:active { cursor: grabbing; }
        #scrolling-text {
            position: absolute; left: 50%; transform: translateX(-50%);
            width: 92%; text-align: center; font-size: 30px; font-weight: bold;
            line-height: 1.5; pointer-events: none; user-select: none; white-space: pre-wrap;
            top: 100px;
        }

        .rec-container {
            position: fixed; bottom: 20px; right: 20px;
            display: flex; flex-direction: row-reverse; align-items: center; gap: 10px; z-index: 5000;
        }
        #timer {
            position: absolute; bottom: 70px; right: 0; color: #ff5555;
            font-family: monospace; font-size: 18px; font-weight: bold; display: none;
            background: rgba(0,0,0,0.8); padding: 4px 10px; border-radius: 8px;
        }
        .sub-rec-btn {
            width: 44px; height: 44px; border-radius: 50%; border: 2px solid white;
            display: none; align-items: center; justify-content: center; cursor: pointer;
            font-size: 18px;
            transition: transform 0.1s;
        }
        .sub-rec-btn:active { transform: scale(0.92); }
        #main-rec-btn {
            width: 56px; height: 56px; background: red; border-radius: 50%;
            border: 3px solid white; display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 0 15px rgba(255,0,0,0.4);
            font-size: 22px;
            transition: transform 0.1s;
        }
        #main-rec-btn:active { transform: scale(0.94); }
        .recording-active { animation: blink 1s infinite; }
        @keyframes blink {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        button { padding: 8px 12px; cursor: pointer; border-radius: 20px; border: none; font-weight: bold; font-size: 12px; color: white; }
        .btn-blue { background: #007bff; }
        .btn-green { background: #28a745; }
        .btn-gray { background: #555; width: 100%; }
        .btn-inner { background: #444; flex: 1; padding: 5px 8px; font-size: 11px; }
        .active-btn { background: #f39c12 !important; }
        input[type="range"] { width: 100%; accent-color: #007bff; margin: 5px 0; }
        
        .status-msg {
            position: fixed;
            bottom: 90px;
            left: 15px;
            background: rgba(0,0,0,0.7);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            color: #0f0;
            z-index: 5000;
        }
        
        .cam-switch-setting {
            background: #6c5ce7;
            color: white;
            width: 100%;
            padding: 6px;
            font-size: 12px;
            border-radius: 20px;
        }
    </style>
</head>
<body onclick="closeAllMenus()">

<div id="controls">
    <textarea id="inputText" oninput="updateLiveText()" placeholder="আপনার স্ক্রিপ্ট লিখুন..."></textarea>
    <div class="main-buttons">
        <button class="btn-blue" onclick="refreshAndStartScroll()">শুরু</button>
        <button class="btn-green" onclick="toggleCamera()">ক্যামেরা</button>
        <div style="position: relative;" onclick="event.stopPropagation()">
            <button class="btn-gray" onclick="toggleSettings()">সেটিংস ⚙️</button>
            <div id="dropdown-menu">
                <div class="setting-item">
                    <span class="setting-label">📷 ক্যামেরা নির্বাচন</span>
                    <button class="cam-switch-setting" onclick="switchCamera()">🔄 ক্যামেরা পাল্টান</button>
                </div>
                <div class="setting-item">
                    <span class="setting-label">✨ বিউটি মোড</span>
                    <div class="btn-group">
                        <button id="bOff" class="btn-inner active-btn" onclick="setBeauty('off')">Off</button>
                        <button id="bOn" class="btn-inner" onclick="setBeauty('on')">স্মুথ</button>
                    </div>
                </div>
                <div class="setting-item">
                    <span class="setting-label">📐 ক্যামেরা শেপ</span>
                    <div class="btn-group">
                        <button class="btn-inner" onclick="changeShape('50%')">গোল</button>
                        <button class="btn-inner" onclick="changeShape('12px')">চৌকো</button>
                    </div>
                </div>
                <div class="setting-item">
                    <span class="setting-label">📝 টেক্সট সাইজ</span>
                    <input type="range" id="textSizeRange" min="15" max="80" value="30" oninput="resizeText(this.value)">
                </div>
                <div class="setting-item">
                    <span class="setting-label">📷 ক্যামেরা সাইজ</span>
                    <input type="range" id="camSizeRange" min="80" max="500" value="150" oninput="resizeCam(this.value)">
                </div>
                <div class="setting-item">
                    <span class="setting-label">⚡ স্ক্রলিং গতি</span>
                    <input type="range" id="speedRange" min="0.5" max="15" step="0.5" value="2">
                </div>
                <div class="setting-item">
                    <span class="setting-label">🎬 রেজুলেশন</span>
                    <div class="btn-group">
                        <button class="btn-inner" onclick="setResolution('hd')">HD (720p)</button>
                        <button class="btn-inner active-btn" onclick="setResolution('fullhd')">Full HD</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="video-container">
    <div class="drag-handle"></div>
    <video id="webcam" autoplay playsinline muted></video>
</div>

<div class="rec-container" onclick="event.stopPropagation()">
    <div id="timer">00:00:00</div>
    <div id="main-rec-btn" onclick="toggleRecMenu()">⏺️</div>
    <div id="start-cam-btn" class="sub-rec-btn" style="background:#dc3545;" onclick="startCameraRecord()">📹</div>
    <div id="start-text-btn" class="sub-rec-btn" style="background:#28a745;" onclick="startTextRecord()">📝</div>
    <div id="pause-btn" class="sub-rec-btn" style="background:#e67e22;" onclick="pauseRecording()">⏸️</div>
    <div id="save-btn" class="sub-rec-btn" style="background:#007bff;" onclick="stopRecording()">💾</div>
</div>

<div id="display-area" onmousedown="dragTextStart(event)" ontouchstart="dragTextStart(event)">
    <div id="scrolling-text">এখানে আপনার স্ক্রিপ্ট লিখুন...</div>
</div>

<div class="status-msg" id="statusMsg">✅ প্রস্তুত | MP4 ফরম্যাট</div>

<script>
    const scrollText = document.getElementById('scrolling-text');
    const videoElem = document.getElementById('webcam');
    const videoCont = document.getElementById('video-container');
    const displayArea = document.getElementById('display-area');
    const menu = document.getElementById('dropdown-menu');
    const timerDisplay = document.getElementById('timer');
    const mainRecBtn = document.getElementById('main-rec-btn');
    const speedRange = document.getElementById('speedRange');
    const statusMsg = document.getElementById('statusMsg');

    let scrollInterval, isAutoScrolling = false, currentY = 100;
    let isMenuOpen = false;
    let mediaStream = null;
    let currentFacingMode = 'user';
    let currentResolution = 'fullhd';
    
    let cameraRecorder = null;
    let cameraChunks = [];
    let isCameraRecording = false;
    
    let textRecorder = null;
    let textChunks = [];
    let isTextRecording = false;
    let textStream = null;
    let textCanvas = null;
    let textAnimationId = null;
    
    let recordingStartTime = 0;
    let timerInterval = null;
    let activeRecordings = 0;

    // MP4 এর জন্য MIME টাইপ চেক এবং সেট
    function getMimeType() {
        // MP4 এর জন্য支持的 MIME types
        const mimeTypes = [
            'video/mp4',
            'video/mp4;codecs=avc1.42E01E,mp4a.40.2',
            'video/mp4;codecs=h264,aac',
            'video/webm' // fallback
        ];
        
        for (let mime of mimeTypes) {
            if (MediaRecorder.isTypeSupported(mime)) {
                return mime;
            }
        }
        return 'video/webm'; // fallback
    }

    function getVideoConstraints() {
        const constraints = { video: { facingMode: { exact: currentFacingMode } }, audio: true };
        if(currentResolution === 'fullhd') {
            constraints.video.width = { ideal: 1920 };
            constraints.video.height = { ideal: 1080 };
        } else {
            constraints.video.width = { ideal: 1280 };
            constraints.video.height = { ideal: 720 };
        }
        return constraints;
    }

    function setResolution(type) {
        currentResolution = type;
        const btns = document.querySelectorAll('#dropdown-menu .setting-item:last-child .btn-inner');
        btns.forEach(btn => btn.classList.remove('active-btn'));
        if(type === 'hd') {
            btns[0].classList.add('active-btn');
            statusMsg.innerText = "HD (720p) | MP4";
        } else {
            btns[1].classList.add('active-btn');
            statusMsg.innerText = "Full HD (1080p) | MP4";
        }
        setTimeout(() => statusMsg.innerText = "✅ প্রস্তুত | MP4 ফরম্যাট", 1500);
        if(mediaStream) {
            const wasOn = videoCont.style.display === "block";
            if(wasOn) { toggleCamera(); setTimeout(() => toggleCamera(), 500); }
        }
    }

    function makeDraggable(element) {
        let isDragging = false, startX, startY;
        const onMouseDown = (e) => {
            e.preventDefault(); e.stopPropagation();
            isDragging = true;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const rect = element.getBoundingClientRect();
            startX = clientX - rect.left;
            startY = clientY - rect.top;
            element.style.right = 'auto';
            element.style.bottom = 'auto';
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
            document.addEventListener('touchmove', onMouseMove, { passive: false });
            document.addEventListener('touchend', onMouseUp);
        };
        const onMouseMove = (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            let newLeft = clientX - startX;
            let newTop = clientY - startY;
            newLeft = Math.max(5, Math.min(window.innerWidth - element.offsetWidth - 5, newLeft));
            newTop = Math.max(5, Math.min(window.innerHeight - element.offsetHeight - 100, newTop));
            element.style.left = newLeft + 'px';
            element.style.top = newTop + 'px';
        };
        const onMouseUp = () => {
            isDragging = false;
            document.removeEventListener('mousemove', onMouseMove);
            document.removeEventListener('mouseup', onMouseUp);
            document.removeEventListener('touchmove', onMouseMove);
            document.removeEventListener('touchend', onMouseUp);
        };
        element.addEventListener('mousedown', onMouseDown);
        element.addEventListener('touchstart', onMouseDown, { passive: false });
    }

    async function switchCamera() {
        if(!mediaStream) { alert("প্রথমে ক্যামেরা চালু করুন!"); return; }
        currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
        if(mediaStream) mediaStream.getTracks().forEach(track => track.stop());
        try {
            const constraints = getVideoConstraints();
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            mediaStream = stream;
            videoElem.srcObject = stream;
            videoElem.style.transform = currentFacingMode === 'user' ? "scaleX(-1)" : "scaleX(1)";
            const camName = currentFacingMode === 'user' ? 'সামনের' : 'পিছনের';
            statusMsg.innerText = `✅ ${camName} ক্যামেরা | MP4`;
            setTimeout(() => statusMsg.innerText = "✅ প্রস্তুত | MP4 ফরম্যাট", 1500);
        } catch(err) { alert("ক্যামেরা পরিবর্তন করা যায়নি!"); }
    }

    function updateLiveText() {
        let text = document.getElementById('inputText').value;
        scrollText.innerText = text || "এখানে আপনার স্ক্রিপ্ট লিখুন...";
        if(!isAutoScrolling) { currentY = 100; scrollText.style.top = currentY + "px"; }
    }

    function refreshAndStartScroll() {
        if(!document.getElementById('inputText').value) return alert("আগে স্ক্রিপ্ট লিখুন!");
        currentY = displayArea.offsetHeight; 
        scrollText.style.top = currentY + "px";
        isAutoScrolling = true;
        if(scrollInterval) clearInterval(scrollInterval);
        scrollInterval = setInterval(() => {
            if(isAutoScrolling) {
                currentY -= parseFloat(speedRange.value);
                scrollText.style.top = currentY + "px";
                if(currentY < -scrollText.offsetHeight) currentY = displayArea.offsetHeight;
            }
        }, 25);
    }

    function dragTextStart(e) {
        isAutoScrolling = false;
        let ev = e.touches ? e.touches[0] : e;
        let sY = ev.clientY - currentY;
        function move(e) {
            let ev2 = e.touches ? e.touches[0] : e;
            currentY = ev2.clientY - sY;
            scrollText.style.top = currentY + "px";
        }
        function stop() { 
            document.removeEventListener('mousemove', move); 
            document.removeEventListener('touchmove', move); 
        }
        document.addEventListener('mousemove', move); 
        document.addEventListener('touchmove', move, {passive: false});
        document.addEventListener('mouseup', stop); 
        document.addEventListener('touchend', stop);
    }

    function toggleSettings() { menu.style.display = (menu.style.display === "block") ? "none" : "block"; }
    function closeAllMenus() { menu.style.display = "none"; }
    function resizeText(v) { scrollText.style.fontSize = v + "px"; }
    function changeShape(s) { videoCont.style.borderRadius = s; }
    function resizeCam(v) { videoCont.style.width = v+"px"; videoCont.style.height = v+"px"; }
    function setBeauty(m) {
        videoElem.style.filter = (m==='on') ? "brightness(1.15) contrast(1.1) blur(0.3px)" : "none";
        document.getElementById('bOn').classList.toggle('active-btn', m==='on');
        document.getElementById('bOff').classList.toggle('active-btn', m==='off');
    }
    function toggleRecMenu() {
        isMenuOpen = !isMenuOpen;
        document.querySelectorAll('.sub-rec-btn').forEach(b => b.style.display = isMenuOpen ? 'flex' : 'none');
    }

    async function toggleCamera() {
        if(videoCont.style.display === "block") {
            videoCont.style.display = "none";
            if(mediaStream) { mediaStream.getTracks().forEach(track => track.stop()); mediaStream = null; }
            statusMsg.innerText = "✅ ক্যামেরা বন্ধ";
            setTimeout(() => statusMsg.innerText = "✅ প্রস্তুত | MP4 ফরম্যাট", 1500);
        } else {
            videoCont.style.display = "block";
            try {
                const constraints = getVideoConstraints();
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                mediaStream = stream;
                videoElem.srcObject = stream;
                videoElem.style.transform = currentFacingMode === 'user' ? "scaleX(-1)" : "scaleX(1)";
                setTimeout(() => makeDraggable(videoCont), 100);
                statusMsg.innerText = "✅ ক্যামেরা চালু | MP4";
                setTimeout(() => statusMsg.innerText = "✅ প্রস্তুত | MP4 ফরম্যাট", 1500);
            } catch(err) { alert("ক্যামেরা অ্যাক্সেস প্রয়োজন!"); videoCont.style.display = "none"; }
        }
    }

    function startTimer() {
        if(timerInterval) clearInterval(timerInterval);
        timerDisplay.style.display = 'block';
        timerInterval = setInterval(() => {
            if(activeRecordings === 0) { timerDisplay.style.display = 'none'; return; }
            const elapsed = Date.now() - recordingStartTime;
            const h = Math.floor(elapsed / 3600000);
            const m = Math.floor((elapsed % 3600000) / 60000);
            const s = Math.floor((elapsed % 60000) / 1000);
            timerDisplay.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }, 200);
    }

    function stopTimer() {
        if(timerInterval) clearInterval(timerInterval);
        if(activeRecordings === 0) timerDisplay.style.display = 'none';
    }

    // ক্যামেরা রেকর্ড - MP4 ফরম্যাটে
    async function startCameraRecord() {
        if(!mediaStream) { alert("ক্যামেরা অন করুন!"); return; }
        if(isCameraRecording) return;
        cameraChunks = [];
        const mimeType = getMimeType();
        cameraRecorder = new MediaRecorder(mediaStream, { mimeType: mimeType });
        cameraRecorder.ondataavailable = e => { if(e.data.size > 0) cameraChunks.push(e.data); };
        cameraRecorder.onstop = () => {
            const blob = new Blob(cameraChunks, { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const timestamp = new Date().toISOString().slice(0,19).replace(/:/g, '-');
            const camType = currentFacingMode === 'user' ? 'front' : 'back';
            a.download = `camera_${camType}_${timestamp}.mp4`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            statusMsg.innerText = "✅ ক্যামেরা MP4 সেভ হয়েছে";
            setTimeout(() => statusMsg.innerText = "✅ প্রস্তুত | MP4 ফরম্যাট", 1500);
            cameraChunks = [];
            isCameraRecording = false;
            activeRecordings--;
            if(activeRecordings === 0) stopTimer();
            updateRecordButtonStatus();
        };
        cameraRecorder.start(1000);
        isCameraRecording = true;
        activeRecordings++;
        if(activeRecordings === 1) { recordingStartTime = Date.now(); startTimer(); }
        updateRecordButtonStatus();
        statusMsg.innerText = "📹 ক্যামেরা রেকর্ডিং (MP4)";
        setTimeout(() => statusMsg.innerText = "✅ প্রস্তুত | MP4 ফরম্যাট", 1500);
    }

    // টেক্সট রেকর্ড - MP4 ফরম্যাটে
    async function startTextRecord() {
        if(isTextRecording) return;
        textChunks = [];
        if(!textCanvas) {
            textCanvas = document.createElement('canvas');
            textCanvas.style.position = 'fixed';
            textCanvas.style.top = '-1000px';
            textCanvas.style.left = '-1000px';
            document.body.appendChild(textCanvas);
        }
        const rect = displayArea.getBoundingClientRect();
        textCanvas.width = rect.width;
        textCanvas.height = rect.height;
        const ctx = textCanvas.getContext('2d');
        
        function drawTextFrame() {
            if(!textCanvas) return;
            const newRect = displayArea.getBoundingClientRect();
            if(textCanvas.width !== newRect.width || textCanvas.height !== newRect.height) {
                textCanvas.width = newRect.width;
                textCanvas.height = newRect.height;
            }
            ctx.clearRect(0, 0, textCanvas.width, textCanvas.height);
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, textCanvas.width, textCanvas.height);
            
            const textDiv = scrollText;
            const textRect = textDiv.getBoundingClientRect();
            const textX = textRect.left - newRect.left;
            const textY = textRect.top - newRect.top;
            const cs = window.getComputedStyle(textDiv);
            ctx.font = cs.fontSize + " " + cs.fontFamily;
            ctx.fillStyle = cs.color;
            ctx.textAlign = "center";
            ctx.shadowBlur = 2;
            const lines = textDiv.innerText.split('\n');
            let lh = parseInt(cs.fontSize) * 1.3;
            for(let i = 0; i < lines.length; i++) {
                ctx.fillText(lines[i], textCanvas.width/2, textY + (i * lh) + parseInt(cs.fontSize));
            }
            if(timerDisplay.style.display === 'block') {
                ctx.font = "bold 18px monospace";
                ctx.fillStyle = "#ffaa44";
                ctx.textAlign = "right";
                ctx.fillText(timerDisplay.innerText, textCanvas.width - 15, 35);
            }
            textAnimationId = requestAnimationFrame(drawTextFrame);
        }
        drawTextFrame();
        
        textStream = textCanvas.captureStream(30);
        const mimeType = getMimeType();
        textRecorder = new MediaRecorder(textStream, { mimeType: mimeType });
        textRecorder.ondataavailable = e => { if(e.data.size > 0) textChunks.push(e.data); };
        textRecorder.onstop = () => {
            if(textAnimationId) cancelAnimationFrame(textAnimationId);
            const blob = new Blob(textChunks, { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `text_scroll_${Date.now()}.mp4`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            statusMsg.innerText = "✅ টেক্সট MP4 সেভ হয়েছে";
            setTimeout(() => statusMsg.innerText = "✅ প্রস্তুত | MP4 ফরম্যাট", 1500);
            textChunks = [];
            isTextRecording = false;
            activeRecordings--;
            if(activeRecordings === 0) stopTimer();
            updateRecordButtonStatus();
        };
        textRecorder.start(1000);
        isTextRecording = true;
        activeRecordings++;
        if(activeRecordings === 1) { recordingStartTime = Date.now(); startTimer(); }
        updateRecordButtonStatus();
        statusMsg.innerText = "📝 টেক্সট রেকর্ডিং (MP4)";
        setTimeout(() => statusMsg.innerText = "✅ প্রস্তুত | MP4 ফরম্যাট", 1500);
    }
    
    function pauseRecording() {
        let paused = false;
        if(isCameraRecording && cameraRecorder?.state === "recording") {
            cameraRecorder.pause(); paused = true;
        }
        if(isTextRecording && textRecorder?.state === "recording") {
            textRecorder.pause(); paused = true;
        }
        if(paused) {
            statusMsg.innerText = "⏸️ পaused";
            setTimeout(() => statusMsg.innerText = "✅ প্রস্তুত | MP4", 1000);
        } else if((isCameraRecording && cameraRecorder?.state === "paused") || 
                  (isTextRecording && textRecorder?.state === "paused")) {
            if(isCameraRecording && cameraRecorder.state === "paused") cameraRecorder.resume();
            if(isTextRecording && textRecorder.state === "paused") textRecorder.resume();
            statusMsg.innerText = "▶️ রেকর্ডিং চলছে (MP4)";
            setTimeout(() => statusMsg.innerText = "✅ প্রস্তুত | MP4", 1000);
        } else { alert("কোনো রেকর্ডিং নেই!"); }
    }
    
    function stopRecording() {
        let stopped = false;
        if(isCameraRecording && cameraRecorder && (cameraRecorder.state === "recording" || cameraRecorder.state === "paused")) {
            cameraRecorder.stop(); stopped = true;
        }
        if(isTextRecording && textRecorder && (textRecorder.state === "recording" || textRecorder.state === "paused")) {
            textRecorder.stop(); stopped = true;
        }
        if(stopped) statusMsg.innerText = "💾 MP4 সংরক্ষণ করা হচ্ছে...";
        else alert("কোনো রেকর্ডিং নেই!");
    }
    
    function updateRecordButtonStatus() {
        if(activeRecordings > 0) {
            mainRecBtn.classList.add('recording-active');
            mainRecBtn.innerText = '🔴';
        } else {
            mainRecBtn.classList.remove('recording-active');
            mainRecBtn.innerText = '⏺️';
        }
    }
    
    updateLiveText();
    resizeText(30);
    setTimeout(() => {
        videoCont.style.left = 'auto';
        videoCont.style.right = '20px';
        videoCont.style.top = '180px';
    }, 100);
</script>
